---
- name: Ensure tls test private key is generated
  community.crypto.openssl_privatekey:
    path: /tmp/tls-test-cert.key
    type: ECC
    curve: secp256r1

- name: Ensure tls test certificate is generated
  community.crypto.x509_certificate:
    path: /tmp/tls-test-cert.crt
    privatekey_path: /tmp/tls-test-cert.key
    provider: selfsigned
    selfsigned_not_after: +1d

- name: Ensure tls test certificate is read
  ansible.builtin.slurp:
    src: /tmp/tls-test-cert.crt
  register: incus_tls_test_certificate_state

- name: Ensure incus certificate is added (tls)
  damex.incus.incus_certificate:
    name: tls-test-certificate
    certificate: "{{ incus_tls_test_certificate_state.content | b64decode }}"
    state: present
    url: https://127.0.0.1:8443
    client_cert_path: /tmp/tls-client.crt
    client_key_path: /tmp/tls-client.key
    server_cert_path: /tmp/incus-server.crt
  register: incus_certificate_tls_present_state

- name: Ensure incus certificate is added (tls)
  ansible.builtin.assert:
    that:
      - incus_certificate_tls_present_state is changed

- name: Ensure incus certificate is idempotent (tls)
  damex.incus.incus_certificate:
    name: tls-test-certificate
    certificate: "{{ incus_tls_test_certificate_state.content | b64decode }}"
    state: present
    url: https://127.0.0.1:8443
    client_cert_path: /tmp/tls-client.crt
    client_key_path: /tmp/tls-client.key
    server_cert_path: /tmp/incus-server.crt
  register: incus_certificate_tls_idempotent_state

- name: Ensure incus certificate is idempotent (tls)
  ansible.builtin.assert:
    that:
      - incus_certificate_tls_idempotent_state is not changed

- name: Ensure incus certificate info (tls)
  damex.incus.incus_certificate_info:
    url: https://127.0.0.1:8443
    client_cert_path: /tmp/tls-client.crt
    client_key_path: /tmp/tls-client.key
    server_cert_path: /tmp/incus-server.crt
  register: incus_certificate_tls_info_state

- name: Ensure incus certificate info (tls)
  ansible.builtin.assert:
    that:
      - incus_certificate_tls_info_state.certificates is defined
      - "'tls-test-certificate' in incus_certificate_tls_info_state.certificates | map(attribute='name')"
