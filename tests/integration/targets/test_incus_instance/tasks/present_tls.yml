---
- name: Ensure incus instance is created (tls)
  damex.incus.incus_instance:
    name: tls-test-instance
    source: test-alpine
    profiles: []
    config:
      security.privileged: true
    devices:
      - name: root
        type: disk
        path: /
        pool: instance-pool
    state: stopped
    url: https://127.0.0.1:8443
    client_cert_path: /tmp/tls-client.crt
    client_key_path: /tmp/tls-client.key
    server_cert_path: /var/lib/incus/server.crt
  register: incus_instance_tls_present_state

- name: Ensure incus instance is created (tls)
  ansible.builtin.assert:
    that:
      - incus_instance_tls_present_state is changed

- name: Ensure incus instance is idempotent (tls)
  damex.incus.incus_instance:
    name: tls-test-instance
    source: test-alpine
    profiles: []
    config:
      security.privileged: true
    devices:
      - name: root
        type: disk
        path: /
        pool: instance-pool
    state: stopped
    url: https://127.0.0.1:8443
    client_cert_path: /tmp/tls-client.crt
    client_key_path: /tmp/tls-client.key
    server_cert_path: /var/lib/incus/server.crt
  register: incus_instance_tls_idempotent_state

- name: Ensure incus instance is idempotent (tls)
  ansible.builtin.assert:
    that:
      - incus_instance_tls_idempotent_state is not changed

- name: Ensure incus instance info (tls)
  damex.incus.incus_instance_info:
    url: https://127.0.0.1:8443
    client_cert_path: /tmp/tls-client.crt
    client_key_path: /tmp/tls-client.key
    server_cert_path: /var/lib/incus/server.crt
  register: incus_instance_tls_info_state

- name: Ensure incus instance info (tls)
  ansible.builtin.assert:
    that:
      - incus_instance_tls_info_state.instances is defined
      - "'tls-test-instance' in incus_instance_tls_info_state.instances | map(attribute='name')"

- name: Ensure incus instance info by name (tls)
  damex.incus.incus_instance_info:
    name: tls-test-instance
    url: https://127.0.0.1:8443
    client_cert_path: /tmp/tls-client.crt
    client_key_path: /tmp/tls-client.key
    server_cert_path: /var/lib/incus/server.crt
  register: incus_instance_tls_info_named_state

- name: Ensure incus instance info by name (tls)
  ansible.builtin.assert:
    that:
      - incus_instance_tls_info_named_state.instances | length == 1
      - "'tls-test-instance' in incus_instance_tls_info_named_state.instances | map(attribute='name')"
      - "'container' in incus_instance_tls_info_named_state.instances | map(attribute='type')"
      - "'Stopped' in incus_instance_tls_info_named_state.instances | map(attribute='status')"
