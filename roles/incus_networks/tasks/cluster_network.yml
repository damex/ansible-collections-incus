---
- name: Ensure incus cluster network {{ incus_networks_network_name }}
  when: incus_networks_cluster_info_state.cluster_members | length == 0 or 'database' in incus_networks_cluster_info_state.cluster_members | map(attribute='roles') | first
  block:
    - name: Ensure incus cluster network member {{ incus_networks_network_name }}
      damex.incus.incus_network:
        name: "{{ incus_networks_network_name }}"
        state: "{{ incus_networks_network_state }}"
        type: "{{ incus_networks_network.type }}"
        description: "{{ incus_networks_network_description }}"
        project: "{{ incus_networks_network_project }}"
        config: "{{ incus_networks_network.config | combine(incus_networks_target.config) if (incus_networks_network.config is defined and incus_networks_target.config is defined) else incus_networks_target.config if incus_networks_target.config is defined else incus_networks_network.config | default(omit) }}"
        target: "{{ incus_networks_target.name }}"
        socket_path: "{{ incus_networks_network_socket_path }}"
        url: "{{ incus_networks_network_url }}"
        client_cert: "{{ incus_networks_network_client_cert }}"
        client_key: "{{ incus_networks_network_client_key }}"
        server_cert: "{{ incus_networks_network_server_cert }}"
        client_cert_path: "{{ incus_networks_network_client_cert_path }}"
        client_key_path: "{{ incus_networks_network_client_key_path }}"
        server_cert_path: "{{ incus_networks_network_server_cert_path }}"
        token: "{{ incus_networks_network_token }}"
        validate_certs: "{{ incus_networks_network_validate_certs }}"
      no_log: "{{ incus_networks_client_key is defined or incus_networks_token is defined }}"
      become: true
      loop: "{{ incus_networks_network.targets }}"
      loop_control:
        label: "{{ incus_networks_target.name }}"
        loop_var: incus_networks_target
    - name: Ensure incus cluster network finalized {{ incus_networks_network_name }}
      damex.incus.incus_network:
        name: "{{ incus_networks_network_name }}"
        state: "{{ incus_networks_network_state }}"
        type: "{{ incus_networks_network.type }}"
        description: "{{ incus_networks_network_description }}"
        project: "{{ incus_networks_network_project }}"
        config: "{{ incus_networks_network.config | dict2items | rejectattr('key', 'in', incus_networks_network_member_config_keys) | items2dict if incus_networks_network.config is defined else omit }}"
        socket_path: "{{ incus_networks_network_socket_path }}"
        url: "{{ incus_networks_network_url }}"
        client_cert: "{{ incus_networks_network_client_cert }}"
        client_key: "{{ incus_networks_network_client_key }}"
        server_cert: "{{ incus_networks_network_server_cert }}"
        client_cert_path: "{{ incus_networks_network_client_cert_path }}"
        client_key_path: "{{ incus_networks_network_client_key_path }}"
        server_cert_path: "{{ incus_networks_network_server_cert_path }}"
        token: "{{ incus_networks_network_token }}"
        validate_certs: "{{ incus_networks_network_validate_certs }}"
      vars:
        incus_networks_network_member_config_keys:
          - bridge.external_interfaces
          - parent
          - bgp.ipv4.nexthop
          - bgp.ipv6.nexthop
      no_log: "{{ incus_networks_client_key is defined or incus_networks_token is defined }}"
      become: true
