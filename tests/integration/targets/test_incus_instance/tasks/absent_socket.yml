---
- name: Ensure incus instance is deleted
  damex.incus.incus_instance:
    name: test-instance
    state: absent
  register: incus_instance_absent_state

- name: Ensure incus instance is deleted
  ansible.builtin.assert:
    that:
      - incus_instance_absent_state is changed

- name: Ensure incus instance deletion is idempotent
  damex.incus.incus_instance:
    name: test-instance
    state: absent
  register: incus_instance_absent_idempotent_state

- name: Ensure incus instance deletion is idempotent
  ansible.builtin.assert:
    that:
      - incus_instance_absent_idempotent_state is not changed

- name: Ensure incus instance info after deletion
  damex.incus.incus_instance_info: {}
  register: incus_instance_info_after_state

- name: Ensure incus instance info after deletion
  ansible.builtin.assert:
    that:
      - "'test-instance' not in incus_instance_info_after_state.instances | map(attribute='name')"
