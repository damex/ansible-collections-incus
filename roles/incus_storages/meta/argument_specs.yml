---
argument_specs:
  main:
    short_description: Ensure Incus storage pools.
    description:
      - Ensure Incus storage pools.
    options:
      incus_storages:
        description: List of storage pools to ensure.
        type: list
        elements: dict
        options:
          name:
            description: Name of the storage pool.
            required: true
            type: str
          driver:
            description: Storage driver to use.
            required: true
            type: str
            choices:
              - dir
              - btrfs
              - lvm
              - zfs
              - ceph
              - cephfs
              - cephobject
              - linstor
              - truenas
          project:
            description: Project to scope the storage pool to.
            type: str
          config:
            description: Storage pool configuration options.
            type: dict
            options:
              source:
                description: Path or device to use as storage source.
                type: str
              source.wipe:
                description: Wipe the source device before use.
                type: bool
              size:
                description: Size of the storage pool.
                type: str
              rsync.bwlimit:
                description: Upper limit on the bandwidth for rsync.
                type: str
              rsync.compression:
                description: Whether to use compression for rsync.
                type: bool
              btrfs.mount_options:
                description: Mount options for the Btrfs filesystem.
                type: str
              lvm.metadata_size:
                description: Size of the LVM metadata volume.
                type: str
              lvm.thinpool_metadata_size:
                description: Size of the LVM thin pool metadata volume.
                type: str
              lvm.thinpool_name:
                description: Name of the LVM thin pool.
                type: str
              lvm.use_thinpool:
                description: Whether to use an LVM thin pool.
                type: bool
              lvm.vg.force_reuse:
                description: Force reuse of an existing LVM volume group.
                type: bool
              lvm.vg_name:
                description: Name of the LVM volume group.
                type: str
              zfs.clone_copy:
                description: Whether to use ZFS lightweight clones.
                type: bool
              zfs.export:
                description: Whether to export the ZFS pool on removal.
                type: bool
              zfs.pool_name:
                description: Name of the ZFS pool.
                type: str
              zfs.blocksize:
                description: Block size for the ZFS pool.
                type: str
              ceph.cluster_name:
                description: Name of the Ceph cluster.
                type: str
              ceph.osd.data_pool_name:
                description: Name of the Ceph OSD data pool.
                type: str
              ceph.osd.pg_name:
                description: Name of the Ceph OSD placement group.
                type: str
              ceph.osd.pool_name:
                description: Name of the Ceph OSD pool.
                type: str
              ceph.rbd.clone_copy:
                description: Whether to use RBD lightweight clones.
                type: bool
              ceph.rbd.du:
                description: Whether to use RBD disk usage tracking.
                type: bool
              ceph.rbd.features:
                description: RBD image features to enable.
                type: str
              ceph.user.name:
                description: Ceph user name.
                type: str
              cephfs.cluster_name:
                description: Name of the CephFS cluster.
                type: str
              cephfs.create_missing:
                description: Create missing CephFS pools.
                type: bool
              cephfs.data_pool:
                description: Name of the CephFS data pool.
                type: str
              cephfs.fscache:
                description: Whether to enable fscache for CephFS.
                type: bool
              cephfs.meta_pool:
                description: Name of the CephFS metadata pool.
                type: str
              cephfs.osd_pg_num:
                description: Number of placement groups for CephFS OSD pools.
                type: str
              cephfs.path:
                description: CephFS path to mount.
                type: str
              cephfs.user.name:
                description: CephFS user name.
                type: str
              cephobject.bucket_name_prefix:
                description: Prefix for Ceph object store bucket names.
                type: str
              cephobject.cluster_name:
                description: Name of the Ceph object store cluster.
                type: str
              cephobject.radosgw.endpoint:
                description: URL of the RADOS Gateway endpoint.
                type: str
              cephobject.radosgw.endpoint_cert_file:
                description: Path to the RADOS Gateway endpoint certificate.
                type: str
              cephobject.user.name:
                description: Ceph object store user name.
                type: str
              linstor.resource_group.name:
                description: Name of the LINSTOR resource group.
                type: str
              linstor.resource_group.place_count:
                description: Number of replicas in the LINSTOR resource group.
                type: int
              linstor.resource_group.storage_pool:
                description: LINSTOR storage pool for the resource group.
                type: str
              linstor.volume.prefix:
                description: Prefix for LINSTOR volume names.
                type: str
              drbd.auto_add_quorum_tiebreaker:
                description: Whether to automatically add a DRBD quorum tiebreaker.
                type: bool
              drbd.auto_diskful:
                description: Automatic diskful mode for DRBD.
                type: str
              drbd.on_no_quorum:
                description: Action to take when DRBD has no quorum.
                type: str
              truenas.allow_insecure:
                description: Allow insecure connections to TrueNAS.
                type: bool
              truenas.api_key:
                description: API key for TrueNAS authentication.
                type: str
                no_log: true
              truenas.clone_copy:
                description: Whether to use TrueNAS lightweight clones.
                type: bool
              truenas.config:
                description: Path to the TrueNAS configuration file.
                type: str
              truenas.dataset:
                description: Name of the TrueNAS dataset.
                type: str
              truenas.force_reuse:
                description: Force reuse of an existing TrueNAS dataset.
                type: bool
              truenas.host:
                description: Hostname or IP of the TrueNAS server.
                type: str
              truenas.initiator:
                description: iSCSI initiator name for TrueNAS.
                type: str
              truenas.portal:
                description: iSCSI portal ID for TrueNAS.
                type: str
          state:
            description: Desired state of the storage pool.
            type: str
            choices:
              - present
              - absent
      incus_storages_socket_path:
        description: Path to the Incus Unix socket.
        type: path
      incus_storages_url:
        description: URL of the Incus server API.
        type: str
      incus_storages_client_cert:
        description: Path to the TLS client certificate.
        type: path
      incus_storages_client_key:
        description: Path to the TLS client key.
        type: path
        no_log: true
      incus_storages_server_cert:
        description: Path to the TLS server certificate.
        type: path
      incus_storages_token:
        description: Authentication token for the Incus API.
        type: str
        no_log: true
      incus_storages_validate_certs:
        description: Whether to validate TLS certificates.
        type: bool
      incus_storages_project:
        description: Incus project to scope storage pools to.
        type: str
      incus_storages_state:
        description: Desired state of the storage pools.
        type: str
        choices:
          - present
          - absent
