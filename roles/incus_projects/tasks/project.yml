---
- name: Ensure incus project {{ incus_projects_project_name }}
  damex.incus.incus_project:
    name: "{{ incus_projects_project_name }}"
    state: "{{ incus_projects_project_state }}"
    description: "{{ incus_projects_project.description | default(omit) }}"
    config: "{{ incus_projects_project.config | default(omit) }}"
    socket_path: "{{ incus_projects_socket_path }}"
  become: true
  when: incus_projects_cluster_info_state.cluster_members | length == 0 or 'database' in incus_projects_cluster_info_state.cluster_members[0].roles
