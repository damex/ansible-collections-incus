                      name:
                        required: true
                        type: str
                      id:
                        required: true
                        type: int
                      link:
                        required: true
                        type: str
                      dhcp4:
                        type: bool
                      addresses:
                        type: list
                        elements: str
                      routes:
                        type: list
                        elements: dict
                        options:
                          to:
                            type: str
                          via:
                            type: str
                      nameservers:
                        type: dict
                        options:
                          addresses:
                            type: list
                            elements: str
