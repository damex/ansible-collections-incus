---
- name: Ensure incus cluster role
  ansible.builtin.include_role:
    name: damex.incus.incus_cluster
  vars:
    incus_cluster_primary: "{{ inventory_hostname }}"
    incus_cluster_config:
      core.https_address: 127.0.0.1:8443
      cluster.https_address: 127.0.0.1:8443
    incus_cluster_cluster:
      enabled: true
      server_name: test-node
      server_address: 127.0.0.1:8443

- name: Ensure incusd is ready
  ansible.builtin.command:
    cmd: incus admin waitready --timeout=30
  changed_when: false
