---
argument_specs:
  main:
    short_description: Ensure Incus server.
    description:
      - Ensure Incus server.
    examples: |
      - name: Ensure incus server
        hosts: incus
        tasks:
          - name: Ensure incus server
            ansible.builtin.import_role:
              name: damex.incus.incus_server
            vars:
              incus_server_config:
                core.https_address: :8443
    options:
      incus_server_socket_path:
        description: Path to the Incus Unix socket.
        type: path
      incus_server_url:
        description: URL of the Incus server API.
        type: str
      incus_server_client_cert:
        description: Client certificate content for API authentication.
        type: str
      incus_server_client_key:
        description: Client key content for API authentication.
        type: str
      incus_server_server_cert:
        description: Server certificate content for API verification.
        type: str
      incus_server_client_cert_path:
        description: Path to the TLS client certificate for API authentication.
        type: path
      incus_server_client_key_path:
        description: Path to the TLS client key for API authentication.
        type: path
      incus_server_server_cert_path:
        description: Path to the TLS server certificate for API verification.
        type: path
      incus_server_token:
        description: Authentication token for the Incus API.
        type: str
      incus_server_validate_certs:
        description: Whether to validate TLS certificates.
        type: bool
      incus_server_force:
        type: bool
        description: Force preseed application even when configuration has not changed.
      incus_server_cluster:
        type: dict
        description: Cluster configuration for preseed initialization.
        options:
          enabled:
            type: bool
            description: Whether clustering is enabled.
          server_name:
            type: str
            description: Name of the cluster member.
          server_address:
            type: str
            description: Address of the cluster member for cluster communication.
          cluster_address:
            type: str
            description: Address of an existing cluster member to join.
          cluster_certificate:
            type: str
            description: Expected cluster certificate in X509 PEM format.
          cluster_token:
            type: str
            description: Join token for the target cluster.
      incus_server_config:
        required: true
        type: dict
        description: Server configuration key-value pairs.
        options:
          core.bgp_address:
            type: str
            description: Address to bind the BGP server to.
          core.bgp_asn:
            type: str
            description: BGP Autonomous System Number for the local server.
          core.bgp_routerid:
            type: str
            description: BGP router ID for the local server.
          core.debug_address:
            type: str
            description: Address to bind the pprof debug server to.
          core.dns_address:
            type: str
            description: Address to bind the authoritative DNS server to.
          core.https_address:
            type: str
            description: Address to bind the remote API to.
          core.https_allowed_credentials:
            type: bool
            description: Whether to set Access-Control-Allow-Credentials.
          core.https_allowed_headers:
            type: str
            description: Access-Control-Allow-Headers header value.
          core.https_allowed_methods:
            type: str
            description: Access-Control-Allow-Methods header value.
          core.https_allowed_origin:
            type: str
            description: Access-Control-Allow-Origin header value.
          core.https_trusted_proxy:
            type: str
            description: Comma-separated list of trusted proxy IP addresses.
          core.metrics_address:
            type: str
            description: Address to bind the metrics server to.
          core.metrics_authentication:
            type: bool
            description: Whether to enforce authentication on the metrics endpoint.
          core.proxy_http:
            type: str
            description: HTTP proxy to use.
          core.proxy_https:
            type: str
            description: HTTPS proxy to use.
          core.proxy_ignore_hosts:
            type: str
            description: Hosts that do not need the proxy.
          core.remote_token_expiry:
            type: str
            description: Expiry time for remote add join tokens.
          core.shutdown_timeout:
            type: int
            description: Number of minutes to wait for running operations to complete before shutdown.
          core.storage_buckets_address:
            type: str
            description: Address to bind the storage buckets API to.
          core.syslog_socket:
            type: bool
            description: Whether to enable the syslog socket listener.
          core.trust_ca_certificates:
            type: bool
            description: Whether to trust CA-signed client certificates.
          acme.agree_tos:
            type: bool
            description: Agree to ACME terms of service.
          acme.ca_url:
            type: str
            description: URL to the ACME CA directory.
          acme.challenge:
            type: str
            description: ACME challenge type to use.
            choices:
              - HTTP-01
              - DNS-01
          acme.domain:
            type: str
            description: Domain for which to issue the certificate.
          acme.email:
            type: str
            description: Email address for the account registration.
          acme.http.port:
            type: str
            description: Port to use for HTTP-01 challenge listener.
          acme.provider:
            type: str
            description: DNS provider for DNS-01 challenge.
          acme.provider.environment:
            type: str
            description: Environment variables for the DNS provider.
          acme.provider.resolvers:
            type: str
            description: DNS resolvers for the DNS-01 challenge.
          cluster.healing_threshold:
            type: int
            description: Threshold after which an offline cluster member is evacuated.
          cluster.https_address:
            type: str
            description: Address to bind for intra-cluster communication.
          cluster.images_minimal_replica:
            type: int
            description: Minimum number of cluster members that keep a copy of an image.
          cluster.join_token_expiry:
            type: str
            description: Expiry time for cluster join tokens.
          cluster.max_standby:
            type: int
            description: Maximum number of standby database members.
          cluster.max_voters:
            type: int
            description: Maximum number of voting database members.
          cluster.offline_threshold:
            type: int
            description: Seconds after which an unresponsive member is considered offline.
          cluster.rebalance.batch:
            type: int
            description: Number of instances to move per rebalance batch.
          cluster.rebalance.cooldown:
            type: str
            description: Cooldown period between rebalance batches.
          cluster.rebalance.interval:
            type: int
            description: Interval in seconds between rebalance checks.
          cluster.rebalance.threshold:
            type: int
            description: Percentage threshold to trigger instance rebalancing.
          images.auto_update_cached:
            type: bool
            description: Whether to auto-update cached images.
          images.auto_update_interval:
            type: int
            description: Interval in hours between image auto-update checks.
          images.compression_algorithm:
            type: str
            description: Compression algorithm to use for images.
          images.default_architecture:
            type: str
            description: Default architecture to use in mixed-architecture clusters.
          images.remote_cache_expiry:
            type: int
            description: Number of days after which an unused cached remote image is removed.
          oidc.audience:
            type: str
            description: Expected audience value for the OIDC provider.
          oidc.claim:
            type: str
            description: OIDC claim to use as the username.
          oidc.client.id:
            type: str
            description: OIDC client ID for the Incus server.
          oidc.issuer:
            type: str
            description: Issuer URL for the OIDC provider.
          oidc.scopes:
            type: str
            description: Comma-separated list of OIDC scopes to request.
          openfga.api.token:
            type: str
            description: API token for the OpenFGA server.
          openfga.api.url:
            type: str
            description: URL of the OpenFGA server.
          openfga.store.id:
            type: str
            description: OpenFGA store ID.
          authorization.scriptlet:
            type: str
            description: Starlark scriptlet for custom authorization logic.
          backups.compression_algorithm:
            type: str
            description: Compression algorithm to use for backups.
          instances.lxcfs.per_instance:
            type: bool
            description: Whether to use a per-instance LXCFS process.
          instances.nic.host_name:
            type: str
            description: How to set the host name for a NIC.
          instances.placement.scriptlet:
            type: str
            description: Starlark scriptlet for custom instance placement.
          network.ovn.ca_cert:
            type: str
            description: CA certificate for the OVN northbound connection.
          network.ovn.client_cert:
            type: str
            description: Client certificate for the OVN northbound connection.
          network.ovn.client_key:
            type: str
            description: Client key for the OVN northbound connection.
          network.ovn.integration_bridge:
            type: str
            description: Name of the OVS integration bridge to use.
          network.ovn.northbound_connection:
            type: str
            description: OVN northbound database connection string.
          network.ovs.connection:
            type: str
            description: OVS database connection string.
          storage.backups_volume:
            type: str
            description: Volume to use for storing backup tarballs.
          storage.images_volume:
            type: str
            description: Volume to use for storing image tarballs.
          storage.linstor.ca_cert:
            type: str
            description: CA certificate for the LINSTOR controller connection.
          storage.linstor.client_cert:
            type: str
            description: Client certificate for the LINSTOR controller connection.
          storage.linstor.client_key:
            type: str
            description: Client key for the LINSTOR controller connection.
          storage.linstor.controller_connection:
            type: str
            description: LINSTOR controller connection string.
          storage.linstor.satellite.name:
            type: str
            description: LINSTOR satellite node name for this server.
          storage.logs_volume:
            type: str
            description: Volume to use for storing log files.
          logging:
            type: list
            elements: dict
            description: List of logging targets.
            options:
              name:
                required: true
                type: str
                description: Name of the logging target.
              target.type:
                required: true
                type: str
                description: Type of logging target.
                choices:
                  - loki
                  - syslog
                  - webhook
              target.address:
                required: true
                type: str
                description: Address of the logging target.
              target.username:
                type: str
                description: Username for authentication.
              target.password:
                type: str
                description: Password for authentication.
              target.ca_cert:
                type: str
                description: CA certificate for the server.
              target.facility:
                type: str
                description: Syslog facility for the log message.
              target.labels:
                type: str
                description: Labels for a Loki log entry.
              target.instance:
                type: str
                description: Name to use as the instance field in Loki events.
              target.retry:
                type: int
                description: Number of delivery retries.
              types:
                type: str
                description: Events to send to the logger.
              lifecycle.types:
                type: str
                description: Lifecycle event types to send.
              lifecycle.projects:
                type: str
                description: Projects to send lifecycle events for.
              logging.level:
                type: str
                description: Minimum log level to send to the logger.
