---
- name: Ensure incus project is deleted (tls)
  damex.incus.incus_project:
    name: tls-test-project
    state: absent
    url: https://127.0.0.1:8443
    client_cert_path: /tmp/tls-client.crt
    client_key_path: /tmp/tls-client.key
    server_cert_path: /tmp/incus-server.crt
  register: incus_project_tls_absent_state

- name: Ensure incus project is deleted (tls)
  ansible.builtin.assert:
    that:
      - incus_project_tls_absent_state is changed

- name: Ensure incus project deletion is idempotent (tls)
  damex.incus.incus_project:
    name: tls-test-project
    state: absent
    url: https://127.0.0.1:8443
    client_cert_path: /tmp/tls-client.crt
    client_key_path: /tmp/tls-client.key
    server_cert_path: /tmp/incus-server.crt
  register: incus_project_tls_absent_idempotent_state

- name: Ensure incus project deletion is idempotent (tls)
  ansible.builtin.assert:
    that:
      - incus_project_tls_absent_idempotent_state is not changed

- name: Ensure incus project info after deletion (tls)
  damex.incus.incus_project_info:
    url: https://127.0.0.1:8443
    client_cert_path: /tmp/tls-client.crt
    client_key_path: /tmp/tls-client.key
    server_cert_path: /tmp/incus-server.crt
  register: incus_project_tls_info_after_state

- name: Ensure incus project info after deletion (tls)
  ansible.builtin.assert:
    that:
      - "'tls-test-project' not in incus_project_tls_info_after_state.projects | map(attribute='name')"
