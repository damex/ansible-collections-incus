---
- name: Ensure incus cluster is bootstrapped
  ansible.builtin.include_role:
    name: damex.incus.incus_server
  vars:
    incus_server_preseed: "{{ incus_cluster_preseed }}"
  when:
    - inventory_hostname == incus_cluster_primary
    - not (incus_cluster_info_state.server.config.get('cluster.enabled') | bool)
