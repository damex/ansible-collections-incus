                type: dict
                options:
                  bootcmd:
                    type: list
                    elements: raw
                  user:
                    type: str
                  password:
                    type: str
                    no_log: true
                  ssh_pwauth:
                    type: bool
                  chpasswd:
                    type: dict
                    options:
                      expire:
                        type: bool
                  package_upgrade:
                    type: bool
                  packages:
                    type: list
                    elements: str
                  power_state:
                    type: dict
                    options:
                      mode:
                        type: str
                        choices:
                          - reboot
                          - poweroff
                          - halt
                  write_files:
                    type: list
                    elements: dict
                    options:
                      path:
                        required: true
                        type: str
                      content:
                        type: str
                      owner:
                        type: str
                      permissions:
                        type: str
                  runcmd:
                    type: list
                    elements: raw
              cloud-init.vendor-data:
                type: dict
                options:
                  bootcmd:
                    type: list
                    elements: raw
                  user:
                    type: str
                  password:
                    type: str
                    no_log: true
                  ssh_pwauth:
                    type: bool
                  chpasswd:
                    type: dict
                    options:
                      expire:
                        type: bool
                  package_upgrade:
                    type: bool
                  packages:
                    type: list
                    elements: str
                  power_state:
                    type: dict
                    options:
                      mode:
                        type: str
                        choices:
                          - reboot
                          - poweroff
                          - halt
                  write_files:
                    type: list
                    elements: dict
                    options:
                      path:
                        required: true
                        type: str
                      content:
                        type: str
                      owner:
                        type: str
                      permissions:
                        type: str
                  runcmd:
                    type: list
                    elements: raw
          devices:
            type: list
            elements: dict
            options:
              name:
                required: true
                type: str
              type:
                required: true
                type: str
                choices:
                  - disk
                  - nic
              # disk
              path:
                type: str
              pool:
                type: str
              source:
                type: str
              size:
                type: str
              readonly:
                type: bool
              # nic
              network:
                type: str
              nictype:
                type: str
              parent:
                type: str
              hwaddr:
                type: str
              mtu:
                type: str
              ipv4.address:
                type: str
              ipv4.routes:
                type: str
              ipv6.address:
                type: str
              ipv6.routes:
                type: str
          ephemeral:
            type: bool
          project:
            type: str
          profiles:
            type: list
            elements: str
          state:
            type: str
            choices:
              - started
              - stopped
              - restarted
              - absent
