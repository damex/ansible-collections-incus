---
- name: Ensure incus image imports cluster facts
  damex.incus.incus_cluster_info:
    name: "{{ inventory_hostname }}"
    socket_path: "{{ incus_image_imports_socket_path }}"
    url: "{{ incus_image_imports_url | default(omit) }}"
    client_cert: "{{ incus_image_imports_client_cert | default(omit) }}"
    client_key: "{{ incus_image_imports_client_key | default(omit) }}"
    server_cert: "{{ incus_image_imports_server_cert | default(omit) }}"
    client_cert_path: "{{ incus_image_imports_client_cert_path | default(omit) }}"
    client_key_path: "{{ incus_image_imports_client_key_path | default(omit) }}"
    server_cert_path: "{{ incus_image_imports_server_cert_path | default(omit) }}"
    token: "{{ incus_image_imports_token | default(omit) }}"
    validate_certs: "{{ incus_image_imports_validate_certs }}"
  no_log: "{{ incus_image_imports_client_key is defined or incus_image_imports_token is defined }}"
  register: incus_image_imports_cluster_info_state
  become: true
