---
argument_specs:
  main:
    options:
      incus_instances:
        type: list
        elements: dict
        options:
          name:
            required: true
            type: str
          type:
            type: str
            choices:
              - container
              - virtual-machine
          source:
            required: true
            type: str
          config:
            type: dict
            options:
              limits.cpu:
                type: str
              limits.memory:
                type: str
              limits.processes:
                type: int
              limits.cpu.priority:
                type: int
              limits.cpu.allowance:
                type: str
              limits.disk.priority:
                type: int
              limits.network.priority:
                type: int
              raw.qemu:
                type: str
              boot.autostart:
                type: bool
              boot.autostart.delay:
                type: int
              boot.autostart.priority:
                type: int
              security.privileged:
                type: bool
              security.nesting:
                type: bool
              security.agent.metrics:
                type: bool
              security.bpffs.delegate_attachs:
                type: str
              security.bpffs.delegate_cmds:
                type: str
              security.bpffs.delegate_maps:
                type: str
              security.bpffs.delegate_progs:
                type: str
              security.bpffs.path:
                type: str
              security.csm:
                type: bool
              security.guestapi:
                type: bool
