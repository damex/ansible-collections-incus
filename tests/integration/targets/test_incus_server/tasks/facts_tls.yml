---
- name: Ensure tls client private key is generated
  community.crypto.openssl_privatekey:
    path: /tmp/tls-client.key
    type: ECC
    curve: secp256r1

- name: Ensure tls client certificate is generated
  community.crypto.x509_certificate:
    path: /tmp/tls-client.crt
    privatekey_path: /tmp/tls-client.key
    provider: selfsigned
    selfsigned_not_after: +1d

- name: Ensure tls client certificate is read
  ansible.builtin.slurp:
    src: /tmp/tls-client.crt
  register: incus_tls_client_certificate_state

- name: Ensure tls client certificate is trusted
  damex.incus.incus_certificate:
    name: tls-client
    certificate: "{{ incus_tls_client_certificate_state.content | b64decode }}"
    state: present

- name: Ensure incus server info (socket)
  damex.incus.incus_server_info:
    socket_path: /var/lib/incus/unix.socket
  register: incus_server_socket_info_state

- name: Ensure incus server certificate is stored
  ansible.builtin.copy:
    content: "{{ incus_server_socket_info_state.server.environment.certificate }}"
    dest: /tmp/incus-server.crt
    mode: "0644"

- name: Ensure incus server info (tls) with server certificate validation
  damex.incus.incus_server_info:
    url: https://127.0.0.1:8443
    client_cert_path: /tmp/tls-client.crt
    client_key_path: /tmp/tls-client.key
    server_cert_path: /tmp/incus-server.crt
  register: incus_server_info_tls_state

- name: Ensure incus server info (tls) with server certificate validation
  ansible.builtin.assert:
    that:
      - incus_server_info_tls_state.server is defined
      - incus_server_info_tls_state.server.api_status == 'stable'
      - incus_server_info_tls_state.server.auth == 'trusted'

- name: Ensure incus server info (tls) without certificate validation
  damex.incus.incus_server_info:
    url: https://127.0.0.1:8443
    client_cert_path: /tmp/tls-client.crt
    client_key_path: /tmp/tls-client.key
    validate_certs: false
  register: incus_server_info_tls_no_verify_state

- name: Ensure incus server info (tls) without certificate validation
  ansible.builtin.assert:
    that:
      - incus_server_info_tls_no_verify_state.server is defined
      - incus_server_info_tls_no_verify_state.server.api_status == 'stable'
      - incus_server_info_tls_no_verify_state.server.auth == 'trusted'
