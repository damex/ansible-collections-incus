---
- name: Ensure incus project info
  damex.incus.incus_project_info: {}
  register: incus_project_info_state

- name: Ensure incus project info
  ansible.builtin.assert:
    that:
      - incus_project_info_state.projects is defined
      - incus_project_info_state.projects | length > 0
      - "'default' in incus_project_info_state.projects | map(attribute='name')"
