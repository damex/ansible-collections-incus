---
- name: Ensure incus project {{ incus_projects_project_name }}
  damex.incus.incus_project:
    name: "{{ incus_projects_project_name }}"
    state: "{{ incus_projects_project_state }}"
    description: "{{ incus_projects_project.description | default(omit) }}"
    config: "{{ incus_projects_project.config | default(omit) }}"
    socket_path: "{{ incus_projects_project_socket_path }}"
    url: "{{ incus_projects_project_url }}"
    client_cert: "{{ incus_projects_project_client_cert }}"
    client_key: "{{ incus_projects_project_client_key }}"
    server_cert: "{{ incus_projects_project_server_cert }}"
    client_cert_path: "{{ incus_projects_project_client_cert_path }}"
    client_key_path: "{{ incus_projects_project_client_key_path }}"
    server_cert_path: "{{ incus_projects_project_server_cert_path }}"
    token: "{{ incus_projects_project_token }}"
    validate_certs: "{{ incus_projects_project_validate_certs }}"
  no_log: "{{ incus_projects_client_key is defined or incus_projects_token is defined }}"
  become: true
  when: incus_projects_cluster_info_state.cluster_members | length == 0 or 'database-leader' in incus_projects_cluster_info_state.cluster_members | map(attribute='roles') | first
