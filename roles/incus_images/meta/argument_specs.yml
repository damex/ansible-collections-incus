---
argument_specs:
  main:
    short_description: Ensure Incus images.
    description:
      - Ensure Incus images.
    examples: |
      - name: Ensure incus images
        hosts: incus
        tasks:
          - name: Ensure incus images
            ansible.builtin.import_role:
              name: damex.incus.incus_images
            vars:
              incus_images:
                - source: images:debian/13
                  alias: debian13
                - source: images:ubuntu/24.04
                  alias: ubuntu2404
                  type: virtual-machine
                  auto_update: true
    options:
      incus_images:
        type: list
        elements: dict
        description: List of images to ensure.
        options:
          source:
            required: true
            type: str
            description: Remote source identifier for the image.
          type:
            type: str
            description: Instance type for the image.
            choices:
              - container
              - virtual-machine
          alias:
            required: true
            type: str
            description: Local alias to assign to the image.
          copy_aliases:
            type: bool
            description: Whether to copy aliases from the source.
          auto_update:
            type: bool
            description: Whether to automatically update the image when a new build is available.
          public:
            type: bool
            description: Whether to make the image available to unauthenticated users.
          source_server:
            type: str
            description: URL of the remote image server.
          source_protocol:
            type: str
            description: Protocol to use for the remote image server.
            choices:
              - simplestreams
              - incus
          project:
            type: str
            description: Incus project to scope the image to.
          state:
            type: str
            description: Desired state of the image.
            choices:
              - present
              - absent
      incus_images_socket_path:
        type: path
        description: Path to the Incus Unix socket.
      incus_images_url:
        type: str
        description: URL of the Incus server API.
      incus_images_client_cert:
        type: path
        description: Path to the TLS client certificate.
      incus_images_client_key:
        type: path
        description: Path to the TLS client key.
      incus_images_server_cert:
        type: path
        description: Path to the TLS server certificate.
      incus_images_token:
        type: str
        description: Authentication token for the Incus API.
      incus_images_validate_certs:
        type: bool
        description: Whether to validate TLS certificates.
      incus_images_type:
        type: str
        description: Instance type for the images.
        choices:
          - container
          - virtual-machine
      incus_images_copy_aliases:
        type: bool
        description: Whether to copy aliases from the source.
      incus_images_auto_update:
        type: bool
        description: Whether to automatically update images when a new build is available.
      incus_images_public:
        type: bool
        description: Whether to make images available to unauthenticated users.
      incus_images_source_server:
        type: str
        description: URL of the remote image server.
      incus_images_source_protocol:
        type: str
        description: Protocol to use for the remote image server.
        choices:
          - simplestreams
          - incus
      incus_images_project:
        type: str
        description: Incus project to scope images to.
      incus_images_state:
        type: str
        description: Desired state of the images.
        choices:
          - present
          - absent
