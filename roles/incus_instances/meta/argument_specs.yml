        type: str
        choices:
          - container
          - virtual-machine
      incus_instances_project:
        type: str
      incus_instances_profiles:
        type: list
        elements: str
      incus_instances_ephemeral:
        type: bool
      incus_instances_state:
        type: str
        choices:
          - started
          - stopped
          - restarted
          - absent
