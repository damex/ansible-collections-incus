---
- name: Ensure incus images
  ansible.builtin.include_tasks: image.yml
  vars:
    incus_images_image_name: "{{ incus_images_image.alias }}"
    incus_images_image_source: "{{ incus_images_image.source }}"
    incus_images_image_alias: "{{ incus_images_image.alias }}"
    incus_images_image_type: "{{ incus_images_image.type | default(incus_images_type) }}"
    incus_images_image_copy_aliases: "{{ incus_images_image.copy_aliases | default(incus_images_copy_aliases) }}"
    incus_images_image_auto_update: "{{ incus_images_image.auto_update | default(incus_images_auto_update) }}"
    incus_images_image_public: "{{ incus_images_image.public | default(incus_images_public) }}"
    incus_images_image_source_server: "{{ incus_images_image.source_server | default(incus_images_source_server | default(omit)) }}"
    incus_images_image_source_protocol: "{{ incus_images_image.source_protocol | default(incus_images_source_protocol) }}"
    incus_images_image_project: "{{ incus_images_image.project | default(incus_images_project) }}"
    incus_images_image_state: "{{ incus_images_image.state | default(incus_images_state) }}"
    incus_images_image_socket_path: "{{ incus_images_socket_path }}"
    incus_images_image_url: "{{ incus_images_url | default(omit) }}"
    incus_images_image_client_cert: "{{ incus_images_client_cert | default(omit) }}"
    incus_images_image_client_key: "{{ incus_images_client_key | default(omit) }}"
    incus_images_image_server_cert: "{{ incus_images_server_cert | default(omit) }}"
    incus_images_image_token: "{{ incus_images_token | default(omit) }}"
    incus_images_image_validate_certs: "{{ incus_images_validate_certs }}"
  no_log: "{{ incus_images_client_key is defined or incus_images_token is defined }}"
  loop: "{{ incus_images }}"
  loop_control:
    label: "{{ incus_images_image_name }}"
    loop_var: incus_images_image
