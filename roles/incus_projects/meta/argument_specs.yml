---
argument_specs:
  main:
    short_description: Ensure Incus projects.
    description:
      - Ensure Incus projects.
    options:
      incus_projects:
        description: List of Incus projects to ensure.
        type: list
        elements: dict
        options:
          name:
            description: Name of the project.
            required: true
            type: str
          description:
            description: Description of the project.
            type: str
          config:
            description: Project configuration keys.
            type: dict
            options:
              features.images:
                description: Enable separate image store for the project.
                type: bool
              features.networks:
                description: Enable separate network management for the project.
                type: bool
              features.networks.zones:
                description: Enable separate network zone management for the project.
                type: bool
              features.profiles:
                description: Enable separate profile store for the project.
                type: bool
              features.storage.buckets:
                description: Enable separate storage bucket management for the project.
                type: bool
              features.storage.volumes:
                description: Enable separate storage volume management for the project.
                type: bool
              limits.containers:
                description: Maximum number of containers in the project.
                type: int
              limits.cpu:
                description: Maximum number of CPUs allocated to the project.
                type: int
              limits.disk:
                description: Maximum disk space used by the project.
                type: str
              limits.instances:
                description: Maximum number of instances in the project.
                type: int
              limits.memory:
                description: Maximum memory used by the project.
                type: str
              limits.networks:
                description: Maximum number of networks in the project.
                type: int
              limits.processes:
                description: Maximum number of processes in the project.
                type: int
              limits.virtual-machines:
                description: Maximum number of virtual machines in the project.
                type: int
              restricted:
                description: Whether to block access to security-sensitive features.
                type: bool
              restricted.backups:
                description: Prevent instance or volume backups.
                type: str
                choices:
                  - allow
                  - block
              restricted.cluster.groups:
                description: Comma-separated list of allowed cluster groups.
                type: str
              restricted.cluster.target:
                description: Whether to allow targeting cluster members.
                type: str
                choices:
                  - allow
                  - block
              restricted.containers.interception:
                description: Whether to allow system call interception in containers.
                type: str
                choices:
                  - allow
                  - block
                  - full
              restricted.containers.lowlevel:
                description: Whether to allow low-level container options.
                type: str
                choices:
                  - allow
                  - block
              restricted.containers.nesting:
                description: Whether to allow nesting in containers.
                type: str
                choices:
                  - allow
                  - block
              restricted.containers.privilege:
                description: Control privileged container settings.
                type: str
                choices:
                  - unprivileged
                  - isolated
                  - allow
              restricted.devices.disk:
                description: Control which disk devices can be used.
                type: str
                choices:
                  - allow
                  - block
                  - managed
              restricted.devices.disk.paths:
                description: Comma-separated list of allowed disk source paths.
                type: str
              restricted.devices.gpu:
                description: Whether to allow GPU devices in the project.
                type: str
                choices:
                  - allow
                  - block
              restricted.devices.infiniband:
                description: Whether to allow InfiniBand devices in the project.
                type: str
                choices:
                  - allow
                  - block
              restricted.devices.nic:
                description: Control which network devices can be used.
                type: str
                choices:
                  - allow
                  - block
                  - managed
              restricted.devices.pci:
                description: Whether to allow PCI devices in the project.
                type: str
                choices:
                  - allow
                  - block
              restricted.devices.proxy:
                description: Whether to allow proxy devices in the project.
                type: str
                choices:
                  - allow
                  - block
              restricted.devices.unix-block:
                description: Whether to allow Unix block devices in the project.
                type: str
                choices:
                  - allow
                  - block
              restricted.devices.unix-char:
                description: Whether to allow Unix character devices in the project.
                type: str
                choices:
                  - allow
                  - block
              restricted.devices.unix-hotplug:
                description: Whether to allow Unix hotplug devices in the project.
                type: str
                choices:
                  - allow
                  - block
              restricted.devices.usb:
                description: Whether to allow USB devices in the project.
                type: str
                choices:
                  - allow
                  - block
              restricted.idmap.gid:
                description: Allowed host GID ranges for raw.idmap.
                type: str
              restricted.idmap.uid:
                description: Allowed host UID ranges for raw.idmap.
                type: str
              restricted.networks.access:
                description: Comma-separated list of allowed networks for access.
                type: str
              restricted.networks.integrations:
                description: Comma-separated list of allowed network integrations.
                type: str
              restricted.networks.subnets:
                description: Comma-separated list of allowed network subnets.
                type: str
              restricted.networks.uplinks:
                description: Comma-separated list of allowed network uplinks.
                type: str
              restricted.networks.zones:
                description: Comma-separated list of allowed network zones.
                type: str
              restricted.snapshots:
                description: Prevent instance or volume snapshots.
                type: str
                choices:
                  - allow
                  - block
              restricted.virtual-machines.lowlevel:
                description: Whether to allow low-level virtual machine options.
                type: str
                choices:
                  - allow
                  - block
              backups.compression_algorithm:
                description: Compression algorithm for backups.
                type: str
                choices:
                  - bzip2
                  - gzip
                  - lz4
                  - lzma
                  - xz
                  - zstd
                  - none
              images.auto_update_cached:
                description: Whether to auto-update cached images.
                type: bool
              images.auto_update_interval:
                description: Interval in hours between image auto-updates.
                type: int
              images.compression_algorithm:
                description: Compression algorithm for images.
                type: str
                choices:
                  - bzip2
                  - gzip
                  - lz4
                  - lzma
                  - xz
                  - zstd
                  - none
              images.default_architecture:
                description: Default architecture for images.
                type: str
              images.remote_cache_expiry:
                description: Number of days before cached remote images expire.
                type: int
              network.hwaddr_pattern:
                description: Pattern for automatically generated MAC addresses.
                type: str
          state:
            description: Desired state of the project.
            type: str
            choices:
              - present
              - absent
      incus_projects_socket_path:
        description: Path to the Incus Unix socket.
        type: path
      incus_projects_url:
        description: URL of the Incus server API.
        type: str
      incus_projects_client_cert:
        description: Path to the TLS client certificate.
        type: path
      incus_projects_client_key:
        description: Path to the TLS client key.
        type: path
        no_log: true
      incus_projects_server_cert:
        description: Path to the TLS server certificate.
        type: path
      incus_projects_token:
        description: Authentication token for the Incus API.
        type: str
        no_log: true
      incus_projects_validate_certs:
        description: Whether to validate TLS certificates.
        type: bool
      incus_projects_state:
        description: Desired state of the projects.
        type: str
        choices:
          - present
          - absent
