---
- name: Ensure incus storage pool is created (tls)
  damex.incus.incus_storage:
    name: tls-test-storage-pool
    driver: dir
    config:
      source: /var/lib/incus/storage-pools/tls-test-storage-pool
    state: present
    url: https://127.0.0.1:8443
    client_cert_path: /tmp/tls-client.crt
    client_key_path: /tmp/tls-client.key
    server_cert_path: /tmp/incus-server.crt
  register: incus_storage_tls_present_state

- name: Ensure incus storage pool is created (tls)
  ansible.builtin.assert:
    that:
      - incus_storage_tls_present_state is changed

- name: Ensure incus storage pool is idempotent (tls)
  damex.incus.incus_storage:
    name: tls-test-storage-pool
    driver: dir
    config:
      source: /var/lib/incus/storage-pools/tls-test-storage-pool
    state: present
    url: https://127.0.0.1:8443
    client_cert_path: /tmp/tls-client.crt
    client_key_path: /tmp/tls-client.key
    server_cert_path: /tmp/incus-server.crt
  register: incus_storage_tls_idempotent_state

- name: Ensure incus storage pool is idempotent (tls)
  ansible.builtin.assert:
    that:
      - incus_storage_tls_idempotent_state is not changed

- name: Ensure incus storage info (tls)
  damex.incus.incus_storage_info:
    url: https://127.0.0.1:8443
    client_cert_path: /tmp/tls-client.crt
    client_key_path: /tmp/tls-client.key
    server_cert_path: /tmp/incus-server.crt
  register: incus_storage_tls_info_state

- name: Ensure incus storage info (tls)
  ansible.builtin.assert:
    that:
      - incus_storage_tls_info_state.storage_pools is defined
      - "'tls-test-storage-pool' in incus_storage_tls_info_state.storage_pools | map(attribute='name')"

- name: Ensure incus storage info by name (tls)
  damex.incus.incus_storage_info:
    name: tls-test-storage-pool
    url: https://127.0.0.1:8443
    client_cert_path: /tmp/tls-client.crt
    client_key_path: /tmp/tls-client.key
    server_cert_path: /tmp/incus-server.crt
  register: incus_storage_tls_info_named_state

- name: Ensure incus storage info by name (tls)
  ansible.builtin.assert:
    that:
      - incus_storage_tls_info_named_state.storage_pools | length == 1
      - "'tls-test-storage-pool' in incus_storage_tls_info_named_state.storage_pools | map(attribute='name')"
      - "'dir' in incus_storage_tls_info_named_state.storage_pools | map(attribute='driver')"
