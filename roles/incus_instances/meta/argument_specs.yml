---
argument_specs:
  main:
    short_description: Ensure Incus instances.
    description:
      - Ensure Incus instances.
    examples: |
      - name: Ensure incus instances
        hosts: incus
        tasks:
          - name: Ensure incus instances
            ansible.builtin.import_role:
              name: damex.incus.incus_instances
            vars:
              incus_instances:
                - name: web-01
                  source: images:debian/13
                  profiles:
                    - default
                  config:
                    limits.cpu: "2"
                    limits.memory: 2GB
                - name: db-01
                  source: images:ubuntu/24.04
                  type: virtual-machine
                  config:
                    limits.cpu: "4"
                    limits.memory: 4GB
                  devices:
                    data:
                      type: disk
                      source: data
                      path: /var/lib/postgresql

      - name: Ensure incus instances with cloud-init
        hosts: incus
        tasks:
          - name: Ensure incus instances with cloud-init
            ansible.builtin.import_role:
              name: damex.incus.incus_instances
            vars:
              incus_instances:
                - name: app-01
                  source: images:debian/13
                  config:
                    cloud-init.user-data:
                      users:
                        - name: deploy
                          groups: sudo
                          shell: /bin/bash
                          ssh_authorized_keys:
                            - ssh-ed25519 AAAA... deploy@example.com
                      packages:
                        - nginx
                        - postgresql-client
    options:
      incus_instances:
        description: List of instances to ensure.
        type: list
        elements: dict
        options:
          name:
            description: Name of the instance.
            required: true
            type: str
          type:
            description: Instance type.
            type: str
            choices:
              - container
              - virtual-machine
          source:
            description: Image source for the instance.
            required: true
            type: str
          config:
            description: Instance configuration keys.
            type: dict
            options:
              limits.cpu:
                description: Number or range of CPUs to expose.
                type: str
              limits.memory:
                description: Percentage of host memory or fixed value in bytes.
                type: str
              limits.processes:
                description: Maximum number of processes in the instance.
                type: int
              limits.cpu.priority:
                description: CPU scheduling priority compared to other instances.
                type: int
              limits.cpu.allowance:
                description: CPU time allowance as a percentage or fixed duration.
                type: str
              limits.disk.priority:
                description: I/O request priority when under load (0-10).
                type: int
              limits.network.priority:
                description: Network I/O priority compared to other instances.
                type: int
              raw.qemu:
                description: Raw QEMU command-line arguments.
                type: str
              boot.autostart:
                description: Whether to start the instance on daemon startup.
                type: bool
              boot.autostart.delay:
                description: Seconds to wait after the instance started.
                type: int
              boot.autostart.priority:
                description: Instance startup priority (higher starts first).
                type: int
              security.privileged:
                description: Whether to run the instance in privileged mode.
                type: bool
              security.nesting:
                description: Allow running Incus inside the instance.
                type: bool
              security.agent.metrics:
                description: Whether the incus-agent exposes metrics.
                type: bool
              security.bpffs.delegate_attachs:
                description: Delegated BPF attach types.
                type: str
              security.bpffs.delegate_cmds:
                description: Delegated BPF commands.
                type: str
              security.bpffs.delegate_maps:
                description: Delegated BPF map types.
                type: str
              security.bpffs.delegate_progs:
                description: Delegated BPF program types.
                type: str
              security.bpffs.path:
                description: Path to the BPFFS mount in the instance.
                type: str
              security.csm:
                description: Whether to enable Compatibility Support Module.
                type: bool
              security.guestapi:
                description: Whether to enable the guest API.
                type: bool
              security.guestapi.images:
                description: Whether to allow image access via the guest API.
                type: bool
              security.idmap.base:
                description: Base host UID/GID for the ID map.
                type: int
              security.idmap.isolated:
                description: Whether to use a unique ID map for the instance.
                type: bool
              security.idmap.size:
                description: Size of the ID map range.
                type: int
              security.iommu:
                description: Whether to enable IOMMU for the instance.
                type: bool
              security.protection.delete:
                description: Whether to prevent deletion of the instance.
                type: bool
              security.protection.shift:
                description: Whether to prevent UID/GID shifting.
                type: bool
              security.secureboot:
                description: Whether to enable UEFI Secure Boot.
                type: bool
              security.sev:
                description: Whether to enable AMD SEV encryption.
                type: bool
              security.sev.policy.es:
                description: Whether to enable SEV-ES for the instance.
                type: bool
              security.sev.session.data:
                description: SEV session data blob.
                type: str
              security.sev.session.dh:
                description: SEV Diffie-Hellman key.
                type: str
              security.syscalls.allow:
                description: Allowed syscalls whitelist.
                type: str
              security.syscalls.deny:
                description: Denied syscalls blacklist.
                type: str
              security.syscalls.deny_compat:
                description: Whether to block compat syscalls on amd64.
                type: bool
              security.syscalls.deny_default:
                description: Whether to enable default syscall deny list.
                type: bool
              security.syscalls.intercept.bpf:
                description: Whether to intercept bpf syscalls.
                type: bool
              security.syscalls.intercept.bpf.devices:
                description: Whether to allow device-type BPF programs.
                type: bool
              security.syscalls.intercept.mknod:
                description: Whether to intercept mknod syscalls.
                type: bool
              security.syscalls.intercept.mount:
                description: Whether to intercept mount syscalls.
                type: bool
              security.syscalls.intercept.mount.allowed:
                description: Filesystems allowed for intercepted mounts.
                type: str
              security.syscalls.intercept.mount.fuse:
                description: FUSE mounts to redirect intercepted mounts to.
                type: str
              security.syscalls.intercept.mount.shift:
                description: Whether to use ID-mapped mounts for intercepted mounts.
                type: bool
              security.syscalls.intercept.sched_setscheduler:
                description: Whether to intercept sched_setscheduler syscalls.
                type: bool
              security.syscalls.intercept.setxattr:
                description: Whether to intercept setxattr syscalls.
                type: bool
              security.syscalls.intercept.sysinfo:
                description: Whether to intercept sysinfo syscalls.
                type: bool
              migration.stateful:
                description: Allow stateful stop/start and snapshots.
                type: bool
              migration.incremental.memory:
                description: Whether to use incremental memory transfer.
                type: bool
              migration.incremental.memory.goal:
                description: Target percentage of dirty memory for completion.
                type: int
              migration.incremental.memory.iterations:
                description: Maximum number of memory transfer iterations.
                type: int
              limits.cpu.nodes:
                description: NUMA nodes to restrict the instance to.
                type: str
              limits.hugepages.1GB:
                description: Limit for 1GB huge pages.
                type: str
              limits.hugepages.1MB:
                description: Limit for 1MB huge pages.
                type: str
              limits.hugepages.2MB:
                description: Limit for 2MB huge pages.
                type: str
              limits.hugepages.64KB:
                description: Limit for 64KB huge pages.
                type: str
              limits.memory.enforce:
                description: Memory limit enforcement mode.
                type: str
              limits.memory.hotplug:
                description: Whether to enable memory hotplug.
                type: str
              limits.memory.hugepages:
                description: Whether to back instance memory with huge pages.
                type: bool
              limits.memory.oom_priority:
                description: OOM killer priority for the instance.
                type: int
              limits.memory.swap:
                description: Whether to encourage or discourage swapping.
                type: str
              limits.memory.swap.priority:
                description: Swap priority compared to other instances.
                type: int
              boot.autorestart:
                description: Whether to restart the instance after a crash.
                type: bool
              boot.host_shutdown_action:
                description: Action to take on host shutdown.
                type: str
              boot.host_shutdown_timeout:
                description: Seconds to wait for instance to stop on host shutdown.
                type: int
              boot.stop.priority:
                description: Instance shutdown priority (higher stops first).
                type: int
              snapshots.expiry:
                description: Automatic expiry time for snapshots.
                type: str
              snapshots.expiry.manual:
                description: Expiry time for manually created snapshots.
                type: str
              snapshots.pattern:
                description: Pongo2 template for snapshot names.
                type: str
              snapshots.schedule:
                description: Cron expression for automatic snapshots.
                type: str
              snapshots.schedule.stopped:
                description: Whether to snapshot stopped instances.
                type: bool
              nvidia.driver.capabilities:
                description: NVIDIA driver capabilities to expose.
                type: str
              nvidia.require.cuda:
                description: Required CUDA version.
                type: str
              nvidia.require.driver:
                description: Required NVIDIA driver version.
                type: str
              nvidia.runtime:
                description: Pass NVIDIA runtime libraries into the container.
                type: bool
              raw.apparmor:
                description: Raw AppArmor profile entries.
                type: str
              raw.idmap:
                description: Raw ID map configuration.
                type: str
              raw.lxc:
                description: Raw LXC configuration to append.
                type: str
              raw.qemu.conf:
                description: Raw QEMU configuration overrides.
                type: str
              raw.qemu.qmp.early:
                description: Raw QMP commands before instance start.
                type: str
              raw.qemu.qmp.pre-start:
                description: Raw QMP commands just before instance start.
                type: str
              raw.qemu.qmp.post-start:
                description: Raw QMP commands after instance start.
                type: str
              raw.qemu.scriptlet:
                description: Raw QEMU scriptlet.
                type: str
              raw.seccomp:
                description: Raw Seccomp configuration.
                type: str
              agent.nic_config:
                description: Use instance NIC names and MTU for default interfaces.
                type: bool
              cluster.evacuate:
                description: Evacuation behavior during cluster evacuation.
                type: str
                choices:
                  - auto
                  - live-migrate
                  - migrate
                  - stop
                  - stateful-stop
                  - force-stop
              linux.kernel_modules:
                description: Comma-separated kernel modules to load.
                type: str
              oci.cwd:
                description: Working directory for the OCI container.
                type: str
              oci.entrypoint:
                description: Entrypoint for the OCI container.
                type: str
              oci.gid:
                description: GID to run the OCI container as.
                type: str
              oci.uid:
                description: UID to run the OCI container as.
                type: str
              cloud-init.network-config:
                description: Cloud-init network configuration.
                type: dict
                options:
                  version:
                    description: Network config format version.
                    type: int
                  renderer:
                    description: Network renderer to use.
                    type: str
                  ethernets:
                    description: Ethernet interface configurations.
                    type: list
                    elements: dict
                    options:
                      name:
                        description: Interface name.
                        required: true
                        type: str
                      dhcp4:
                        description: Whether to enable DHCPv4.
                        type: bool
                      addresses:
                        description: Static addresses in CIDR notation.
                        type: list
                        elements: str
                      routes:
                        description: Static routes for the interface.
                        type: list
                        elements: dict
                        options:
                          to:
                            description: Route destination in CIDR notation.
                            type: str
                          via:
                            description: Gateway address for the route.
                            type: str
                      match:
                        description: Match rules for the interface.
                        type: dict
                        options:
                          name:
                            description: Interface name glob pattern to match.
                            type: str
                          macaddress:
                            description: MAC address to match.
                            type: str
                          driver:
                            description: Kernel driver name to match.
                            type: str
                      nameservers:
                        description: DNS server configuration.
                        type: dict
                        options:
                          addresses:
                            description: List of DNS server addresses.
                            type: list
                            elements: str
                  bonds:
                    description: Bond interface configurations.
                    type: list
                    elements: dict
                    options:
                      name:
                        description: Bond name.
                        required: true
                        type: str
                      dhcp4:
                        description: Whether to enable DHCPv4.
                        type: bool
                      addresses:
                        description: Static addresses in CIDR notation.
                        type: list
                        elements: str
                      interfaces:
                        description: Member interfaces for the bond.
                        type: list
                        elements: str
                      parameters:
                        description: Bond parameters.
                        type: dict
                        options:
                          mode:
                            description: Bonding mode.
                            type: str
                          mii-monitor-interval:
                            description: MII monitoring interval in milliseconds.
                            type: int
                      routes:
                        description: Static routes for the bond.
                        type: list
                        elements: dict
                        options:
                          to:
                            description: Route destination in CIDR notation.
                            type: str
                          via:
                            description: Gateway address for the route.
                            type: str
                      nameservers:
                        description: DNS server configuration.
                        type: dict
                        options:
                          addresses:
                            description: List of DNS server addresses.
                            type: list
                            elements: str
                  bridges:
                    description: Bridge interface configurations.
                    type: list
                    elements: dict
                    options:
                      name:
                        description: Bridge name.
                        required: true
                        type: str
                      dhcp4:
                        description: Whether to enable DHCPv4.
                        type: bool
                      addresses:
                        description: Static addresses in CIDR notation.
                        type: list
                        elements: str
                      interfaces:
                        description: Member interfaces for the bridge.
                        type: list
                        elements: str
                      parameters:
                        description: Bridge parameters.
                        type: dict
                        options:
                          stp:
                            description: Whether to enable Spanning Tree Protocol.
                            type: bool
                          forward-delay:
                            description: Forwarding delay in seconds.
                            type: int
                      routes:
                        description: Static routes for the bridge.
                        type: list
                        elements: dict
                        options:
                          to:
                            description: Route destination in CIDR notation.
                            type: str
                          via:
                            description: Gateway address for the route.
                            type: str
                      nameservers:
                        description: DNS server configuration.
                        type: dict
                        options:
                          addresses:
                            description: List of DNS server addresses.
                            type: list
                            elements: str
                  vlans:
                    description: VLAN interface configurations.
                    type: list
                    elements: dict
                    options:
                      name:
                        description: VLAN interface name.
                        required: true
                        type: str
                      id:
                        description: VLAN ID.
                        required: true
                        type: int
                      link:
                        description: Parent interface for the VLAN.
                        required: true
                        type: str
                      dhcp4:
                        description: Whether to enable DHCPv4.
                        type: bool
                      addresses:
                        description: Static addresses in CIDR notation.
                        type: list
                        elements: str
                      routes:
                        description: Static routes for the VLAN.
                        type: list
                        elements: dict
                        options:
                          to:
                            description: Route destination in CIDR notation.
                            type: str
                          via:
                            description: Gateway address for the route.
                            type: str
                      nameservers:
                        description: DNS server configuration.
                        type: dict
                        options:
                          addresses:
                            description: List of DNS server addresses.
                            type: list
                            elements: str
              cloud-init.user-data:
                description: Cloud-init user data configuration.
                type: dict
                options:
                  bootcmd:
                    description: Commands to run early in the boot process.
                    type: list
                    elements: raw
                  user:
                    description: Default user name.
                    type: str
                  password:
                    description: Password for the default user.
                    type: str
                  ssh_pwauth:
                    description: Whether to enable SSH password authentication.
                    type: bool
                  chpasswd:
                    description: Password change settings.
                    type: dict
                    options:
                      expire:
                        description: Whether the password expires on first login.
                        type: bool
                  package_upgrade:
                    description: Whether to upgrade packages on first boot.
                    type: bool
                  packages:
                    description: Packages to install on first boot.
                    type: list
                    elements: str
                  power_state:
                    description: Power state change after cloud-init completes.
                    type: dict
                    options:
                      mode:
                        description: Power state action to take.
                        type: str
                        choices:
                          - reboot
                          - poweroff
                          - halt
                  write_files:
                    description: Files to create on first boot.
                    type: list
                    elements: dict
                    options:
                      path:
                        description: Absolute path of the file to create.
                        required: true
                        type: str
                      content:
                        description: Content to write to the file.
                        type: str
                      owner:
                        description: Owner and group of the file.
                        type: str
                      permissions:
                        description: File permissions in octal notation.
                        type: str
                  runcmd:
                    description: Commands to run after cloud-init completes.
                    type: list
                    elements: raw
              cloud-init.vendor-data:
                description: Cloud-init vendor data configuration.
                type: dict
                options:
                  bootcmd:
                    description: Commands to run early in the boot process.
                    type: list
                    elements: raw
                  user:
                    description: Default user name.
                    type: str
                  password:
                    description: Password for the default user.
                    type: str
                  ssh_pwauth:
                    description: Whether to enable SSH password authentication.
                    type: bool
                  chpasswd:
                    description: Password change settings.
                    type: dict
                    options:
                      expire:
                        description: Whether the password expires on first login.
                        type: bool
                  package_upgrade:
                    description: Whether to upgrade packages on first boot.
                    type: bool
                  packages:
                    description: Packages to install on first boot.
                    type: list
                    elements: str
                  power_state:
                    description: Power state change after cloud-init completes.
                    type: dict
                    options:
                      mode:
                        description: Power state action to take.
                        type: str
                        choices:
                          - reboot
                          - poweroff
                          - halt
                  write_files:
                    description: Files to create on first boot.
                    type: list
                    elements: dict
                    options:
                      path:
                        description: Absolute path of the file to create.
                        required: true
                        type: str
                      content:
                        description: Content to write to the file.
                        type: str
                      owner:
                        description: Owner and group of the file.
                        type: str
                      permissions:
                        description: File permissions in octal notation.
                        type: str
                  runcmd:
                    description: Commands to run after cloud-init completes.
                    type: list
                    elements: raw
          devices:
            description: Devices to attach to the instance.
            type: list
            elements: dict
            options:
              name:
                description: Name of the device.
                required: true
                type: str
              type:
                description: Device type.
                required: true
                type: str
                choices:
                  - disk
                  - nic
                  - none
                  - tpm
                  - unix-block
                  - unix-char
                  - unix-hotplug
                  - usb
                  - gpu
                  - infiniband
                  - pci
                  - proxy
              # shared
              attached:
                description: Whether the device is attached or ejected.
                type: bool
              boot.priority:
                description: Boot priority for VMs.
                type: int
              gid:
                description: GID of the device owner in the instance.
                type: int
              io.bus:
                description: Override bus for the device.
                type: str
              limits.max:
                description: I/O limit in byte/s or IOPS (disk), or combined traffic limit in bit/s (nic).
                type: str
              mode:
                description: NIC mode or device permission mode.
                type: str
              path:
                description: Path inside the instance.
                type: str
              pci:
                description: PCI address of the parent host device.
                type: str
              productid:
                description: Product ID of the parent host device.
                type: str
              required:
                description: Whether to fail if the source does not exist.
                type: bool
              source:
                description: Source of a file system, block device, or host device path.
                type: str
              uid:
                description: UID of the device owner in the instance.
                type: int
              hwaddr:
                description: MAC address of the new interface.
                type: str
              mtu:
                description: Maximum transmission unit of the new interface.
                type: str
              nictype:
                description: NIC type when not using a managed network.
                type: str
              parent:
                description: Parent host device name.
                type: str
              vendorid:
                description: Vendor ID of the parent host device.
                type: str
              # disk
              ceph.cluster_name:
                description: Ceph cluster name.
                type: str
              ceph.user_name:
                description: Ceph user name.
                type: str
              io.cache:
                description: Caching mode for the disk device.
                type: str
              limits.read:
                description: I/O limit in byte/s or IOPS for read operations.
                type: str
              limits.write:
                description: I/O limit in byte/s or IOPS for write operations.
                type: str
              pool:
                description: Storage pool for the disk device.
                type: str
              propagation:
                description: Controls how a bind-mount is shared between instance and host.
                type: str
              raw.mount.options:
                description: File system specific mount options.
                type: str
              readonly:
                description: Whether to make the mount read-only.
                type: bool
              recursive:
                description: Whether to recursively mount the source path.
                type: bool
              shift:
                description: Whether to set up a shifting overlay to translate UID/GID.
                type: bool
              size:
                description: Disk size limit.
                type: str
              size.state:
                description: Size for the VM runtime state file system.
                type: str
              wwn:
                description: Whether to set a World Wide Name for the disk.
                type: bool
              # nic
              acceleration:
                description: Enable hardware offloading (none/sriov/vdpa).
                type: str
              connected:
                description: Whether the NIC is connected to the host network.
                type: bool
              gvrp:
                description: Register VLAN using GARP VLAN Registration Protocol.
                type: bool
              host_name:
                description: Name of the interface on the host.
                type: str
              ipv4.address:
                description: IPv4 address to assign via DHCP or static allocation.
                type: str
              ipv4.address.external:
                description: Select specific external IPv4 address.
                type: str
              ipv4.gateway:
                description: Default IPv4 gateway.
                type: str
              ipv4.host_address:
                description: IPv4 address on the host-side veth interface.
                type: str
              ipv4.host_table:
                description: Custom policy routing table ID for IPv4 (deprecated).
                type: int
              ipv4.host_tables:
                description: Comma-separated routing table IDs for IPv4 routes.
                type: str
              ipv4.neighbor_probe:
                description: Whether to probe the parent network for IP availability.
                type: bool
              ipv4.routes:
                description: Comma-delimited IPv4 static routes to add on the host.
                type: str
              ipv4.routes.external:
                description: Comma-delimited IPv4 routes to publish via BGP.
                type: str
              ipv6.address:
                description: IPv6 address to assign via DHCP or static allocation.
                type: str
              ipv6.address.external:
                description: Select specific external IPv6 address.
                type: str
              ipv6.gateway:
                description: Default IPv6 gateway.
                type: str
              ipv6.host_address:
                description: IPv6 address on the host-side veth interface.
                type: str
              ipv6.host_table:
                description: Custom policy routing table ID for IPv6 (deprecated).
                type: int
              ipv6.host_tables:
                description: Comma-separated routing table IDs for IPv6 routes.
                type: str
              ipv6.neighbor_probe:
                description: Whether to probe the parent network for IP availability.
                type: bool
              ipv6.routes:
                description: Comma-delimited IPv6 static routes to add on the host.
                type: str
              ipv6.routes.external:
                description: Comma-delimited IPv6 routes to publish via BGP.
                type: str
              limits.egress:
                description: Outgoing traffic I/O limit in bit/s.
                type: str
              limits.ingress:
                description: Incoming traffic I/O limit in bit/s.
                type: str
              limits.priority:
                description: Outgoing traffic priority for queuing.
                type: int
              nested:
                description: Parent NIC name to nest this OVN NIC under.
                type: str
              network:
                description: Managed network to attach the NIC to.
                type: str
              queue.tx.length:
                description: Transmit queue length for the NIC.
                type: int
              security.acls:
                description: Comma-separated list of network ACLs to apply.
                type: str
              security.acls.default.egress.action:
                description: Default action for egress traffic not matching any ACL rule.
                type: str
              security.acls.default.egress.logged:
                description: Whether to log egress traffic not matching any ACL rule.
                type: bool
              security.acls.default.ingress.action:
                description: Default action for ingress traffic not matching any ACL rule.
                type: str
              security.acls.default.ingress.logged:
                description: Whether to log ingress traffic not matching any ACL rule.
                type: bool
              security.ipv4_filtering:
                description: Whether to prevent IPv4 address spoofing.
                type: bool
              security.ipv6_filtering:
                description: Whether to prevent IPv6 address spoofing.
                type: bool
              security.mac_filtering:
                description: Whether to prevent MAC address spoofing.
                type: bool
              security.port_isolation:
                description: Whether to prevent communication with other isolated NICs.
                type: bool
              security.promiscuous:
                description: Whether to send unknown traffic to this interface.
                type: bool
              security.trusted:
                description: Whether to allow the instance to configure the NIC unsafely.
                type: bool
              vlan:
                description: VLAN ID to attach to.
                type: int
              vlan.tagged:
