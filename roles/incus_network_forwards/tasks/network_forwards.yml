---
- name: Ensure incus network forwards
  ansible.builtin.include_tasks: network_forward.yml
  vars:
    incus_network_forwards_network_forward_name: "{{ incus_network_forwards_network_forward.name }}"
    incus_network_forwards_network_forward_state: "{{ incus_network_forwards_network_forward.state | default(incus_network_forwards_state) }}"
    incus_network_forwards_network_forward_project: "{{ incus_network_forwards_network_forward.project | default(incus_network_forwards_project) }}"
    incus_network_forwards_network_forward_network: "{{ incus_network_forwards_network_forward.network | default(incus_network_forwards_network) }}"
    incus_network_forwards_network_forward_socket_path: "{{ incus_network_forwards_socket_path }}"
    incus_network_forwards_network_forward_url: "{{ incus_network_forwards_url | default(omit) }}"
    incus_network_forwards_network_forward_client_cert: "{{ incus_network_forwards_client_cert | default(omit) }}"
    incus_network_forwards_network_forward_client_key: "{{ incus_network_forwards_client_key | default(omit) }}"
    incus_network_forwards_network_forward_server_cert: "{{ incus_network_forwards_server_cert | default(omit) }}"
    incus_network_forwards_network_forward_client_cert_path: "{{ incus_network_forwards_client_cert_path | default(omit) }}"
    incus_network_forwards_network_forward_client_key_path: "{{ incus_network_forwards_client_key_path | default(omit) }}"
    incus_network_forwards_network_forward_server_cert_path: "{{ incus_network_forwards_server_cert_path | default(omit) }}"
    incus_network_forwards_network_forward_token: "{{ incus_network_forwards_token | default(omit) }}"
    incus_network_forwards_network_forward_validate_certs: "{{ incus_network_forwards_validate_certs }}"
  no_log: "{{ incus_network_forwards_client_key is defined or incus_network_forwards_token is defined }}"
  loop: "{{ incus_network_forwards }}"
  loop_control:
    label: "{{ incus_network_forwards_network_forward_name }}"
    loop_var: incus_network_forwards_network_forward
