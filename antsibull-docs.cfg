breadcrumbs = true
indexes = true
use_html_blobs = false
add_antsibull_docs_version = true

collection_url = {
  damex.incus = "https://github.com/damex/ansible-collections-incus"
  * = "https://galaxy.ansible.com/ui/repo/published/{namespace}/{name}/"
}

collection_install = {
  * = "ansible-galaxy collection install {namespace}.{name}"
}
