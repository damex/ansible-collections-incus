---
- name: Ensure incus image is deleted
  damex.incus.incus_image:
    alias: test-alpine
    state: absent
  register: incus_image_absent_state

- name: Ensure incus image is deleted
  ansible.builtin.assert:
    that:
      - incus_image_absent_state is changed

- name: Ensure incus image deletion is idempotent
  damex.incus.incus_image:
    alias: test-alpine
    state: absent
  register: incus_image_absent_idempotent_state

- name: Ensure incus image deletion is idempotent
  ansible.builtin.assert:
    that:
      - incus_image_absent_idempotent_state is not changed

- name: Ensure incus image info after deletion
  damex.incus.incus_image_info: {}
  register: incus_image_info_after_state

- name: Ensure incus image info after deletion
  ansible.builtin.assert:
    that:
      - "'test-alpine' not in incus_image_info_after_state.images | map(attribute='aliases') | flatten | map(attribute='name')"
