---
- name: Ensure incus cluster group
  block:
    - name: Ensure incus cluster group present (socket)
      ansible.builtin.import_tasks: present_socket.yml
    - name: Ensure incus cluster group absent (socket)
      ansible.builtin.import_tasks: absent_socket.yml
    - name: Ensure incus cluster group present (tls)
      ansible.builtin.import_tasks: present_tls.yml
    - name: Ensure incus cluster group absent (tls)
      ansible.builtin.import_tasks: absent_tls.yml
