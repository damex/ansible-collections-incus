                      name:
                        required: true
                        type: str
                      dhcp4:
                        type: bool
                      addresses:
                        type: list
                        elements: str
                      routes:
                        type: list
                        elements: dict
                        options:
                          to:
                            type: str
                          via:
                            type: str
                      match:
                        type: dict
                        options:
                          driver:
                            type: str
                      nameservers:
                        type: dict
                        options:
                          addresses:
                            type: list
                            elements: str
                  bonds:
                    type: list
                    elements: dict
                    options:
                      name:
                        required: true
                        type: str
                      dhcp4:
                        type: bool
                      addresses:
                        type: list
                        elements: str
                      interfaces:
                        type: list
                        elements: str
                      parameters:
                        type: dict
