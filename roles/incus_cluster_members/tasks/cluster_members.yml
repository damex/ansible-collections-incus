---
- name: Ensure incus cluster members
  ansible.builtin.include_tasks: cluster_member.yml
  vars:
    incus_cluster_members_cluster_member_name: "{{ incus_cluster_members_cluster_member.name }}"
    incus_cluster_members_cluster_member_state: "{{ incus_cluster_members_cluster_member.state | default(incus_cluster_members_state) }}"
    incus_cluster_members_cluster_member_socket_path: "{{ incus_cluster_members_socket_path }}"
    incus_cluster_members_cluster_member_url: "{{ incus_cluster_members_url | default(omit) }}"
    incus_cluster_members_cluster_member_client_cert: "{{ incus_cluster_members_client_cert | default(omit) }}"
    incus_cluster_members_cluster_member_client_key: "{{ incus_cluster_members_client_key | default(omit) }}"
    incus_cluster_members_cluster_member_server_cert: "{{ incus_cluster_members_server_cert | default(omit) }}"
    incus_cluster_members_cluster_member_client_cert_path: "{{ incus_cluster_members_client_cert_path | default(omit) }}"
    incus_cluster_members_cluster_member_client_key_path: "{{ incus_cluster_members_client_key_path | default(omit) }}"
    incus_cluster_members_cluster_member_server_cert_path: "{{ incus_cluster_members_server_cert_path | default(omit) }}"
    incus_cluster_members_cluster_member_token: "{{ incus_cluster_members_token | default(omit) }}"
    incus_cluster_members_cluster_member_validate_certs: "{{ incus_cluster_members_validate_certs }}"
  no_log: "{{ incus_cluster_members_client_key is defined or incus_cluster_members_token is defined }}"
  loop: "{{ incus_cluster_members }}"
  loop_control:
    label: "{{ incus_cluster_members_cluster_member_name }}"
    loop_var: incus_cluster_members_cluster_member
