---
- name: Ensure incus network zones
  ansible.builtin.include_tasks: network_zone.yml
  vars:
    incus_network_zones_network_zone_name: "{{ incus_network_zones_network_zone.name }}"
    incus_network_zones_network_zone_state: "{{ incus_network_zones_network_zone.state | default(incus_network_zones_state) }}"
    incus_network_zones_network_zone_project: "{{ incus_network_zones_network_zone.project | default(incus_network_zones_project) }}"
    incus_network_zones_network_zone_socket_path: "{{ incus_network_zones_socket_path }}"
    incus_network_zones_network_zone_url: "{{ incus_network_zones_url | default(omit) }}"
    incus_network_zones_network_zone_client_cert: "{{ incus_network_zones_client_cert | default(omit) }}"
    incus_network_zones_network_zone_client_key: "{{ incus_network_zones_client_key | default(omit) }}"
    incus_network_zones_network_zone_server_cert: "{{ incus_network_zones_server_cert | default(omit) }}"
    incus_network_zones_network_zone_client_cert_path: "{{ incus_network_zones_client_cert_path | default(omit) }}"
    incus_network_zones_network_zone_client_key_path: "{{ incus_network_zones_client_key_path | default(omit) }}"
    incus_network_zones_network_zone_server_cert_path: "{{ incus_network_zones_server_cert_path | default(omit) }}"
    incus_network_zones_network_zone_token: "{{ incus_network_zones_token | default(omit) }}"
    incus_network_zones_network_zone_validate_certs: "{{ incus_network_zones_validate_certs }}"
  no_log: "{{ incus_network_zones_client_key is defined or incus_network_zones_token is defined }}"
  loop: "{{ incus_network_zones }}"
  loop_control:
    label: "{{ incus_network_zones_network_zone_name }}"
    loop_var: incus_network_zones_network_zone
