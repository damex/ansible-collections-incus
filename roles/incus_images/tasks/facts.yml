---
- name: Ensure incus images cluster member facts
  damex.incus.incus_cluster_member_info:
    name: "{{ inventory_hostname }}"
    socket_path: "{{ incus_images_socket_path }}"
    url: "{{ incus_images_url | default(omit) }}"
    client_cert: "{{ incus_images_client_cert | default(omit) }}"
    client_key: "{{ incus_images_client_key | default(omit) }}"
    server_cert: "{{ incus_images_server_cert | default(omit) }}"
    client_cert_path: "{{ incus_images_client_cert_path | default(omit) }}"
    client_key_path: "{{ incus_images_client_key_path | default(omit) }}"
    server_cert_path: "{{ incus_images_server_cert_path | default(omit) }}"
    token: "{{ incus_images_token | default(omit) }}"
    validate_certs: "{{ incus_images_validate_certs }}"
  no_log: "{{ incus_images_client_key is defined or incus_images_token is defined }}"
  register: incus_images_cluster_info_state
  become: true
