---
- name: Ensure incus project is created (tls)
  damex.incus.incus_project:
    name: tls-test-project
    description: Test project (tls)
    config:
      features.images: true
      features.networks: true
      features.networks.zones: true
      features.profiles: true
      features.storage.buckets: true
      features.storage.volumes: true
    state: present
    url: https://127.0.0.1:8443
    client_cert_path: /tmp/tls-client.crt
    client_key_path: /tmp/tls-client.key
    server_cert_path: /var/lib/incus/server.crt
  register: incus_project_tls_present_state

- name: Ensure incus project is created (tls)
  ansible.builtin.assert:
    that:
      - incus_project_tls_present_state is changed

- name: Ensure incus project is idempotent (tls)
  damex.incus.incus_project:
    name: tls-test-project
    description: Test project (tls)
    config:
      features.images: true
      features.networks: true
      features.networks.zones: true
      features.profiles: true
      features.storage.buckets: true
      features.storage.volumes: true
    state: present
    url: https://127.0.0.1:8443
    client_cert_path: /tmp/tls-client.crt
    client_key_path: /tmp/tls-client.key
    server_cert_path: /var/lib/incus/server.crt
  register: incus_project_tls_idempotent_state

- name: Ensure incus project is idempotent (tls)
  ansible.builtin.assert:
    that:
      - incus_project_tls_idempotent_state is not changed

- name: Ensure incus project info (tls)
  damex.incus.incus_project_info:
    url: https://127.0.0.1:8443
    client_cert_path: /tmp/tls-client.crt
    client_key_path: /tmp/tls-client.key
    server_cert_path: /var/lib/incus/server.crt
  register: incus_project_tls_info_state

- name: Ensure incus project info (tls)
  ansible.builtin.assert:
    that:
      - incus_project_tls_info_state.projects is defined
      - "'tls-test-project' in incus_project_tls_info_state.projects | map(attribute='name')"
