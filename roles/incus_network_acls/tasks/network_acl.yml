---
- name: Ensure incus network acl {{ incus_network_acls_network_acl_name }}
  damex.incus.incus_network_acl:
    name: "{{ incus_network_acls_network_acl_name }}"
    state: "{{ incus_network_acls_network_acl_state }}"
    project: "{{ incus_network_acls_network_acl_project }}"
    description: "{{ incus_network_acls_network_acl.description | default(omit) }}"
    config: "{{ incus_network_acls_network_acl.config | default(omit) }}"
    ingress: "{{ incus_network_acls_network_acl.ingress | default(omit) }}"
    egress: "{{ incus_network_acls_network_acl.egress | default(omit) }}"
    socket_path: "{{ incus_network_acls_network_acl_socket_path }}"
    url: "{{ incus_network_acls_network_acl_url }}"
    client_cert: "{{ incus_network_acls_network_acl_client_cert }}"
    client_key: "{{ incus_network_acls_network_acl_client_key }}"
    server_cert: "{{ incus_network_acls_network_acl_server_cert }}"
    client_cert_path: "{{ incus_network_acls_network_acl_client_cert_path }}"
    client_key_path: "{{ incus_network_acls_network_acl_client_key_path }}"
    server_cert_path: "{{ incus_network_acls_network_acl_server_cert_path }}"
    token: "{{ incus_network_acls_network_acl_token }}"
    validate_certs: "{{ incus_network_acls_network_acl_validate_certs }}"
  no_log: "{{ incus_network_acls_client_key is defined or incus_network_acls_token is defined }}"
  become: true
  when: incus_network_acls_cluster_info_state.cluster_members | length == 0 or 'database-leader' in incus_network_acls_cluster_info_state.cluster_members | map(attribute='roles') | first
