---
- name: Ensure incus profile is deleted
  damex.incus.incus_profile:
    name: test-profile
    state: absent
  register: incus_profile_absent_state

- name: Ensure incus profile is deleted
  ansible.builtin.assert:
    that:
      - incus_profile_absent_state is changed

- name: Ensure incus profile deletion is idempotent
  damex.incus.incus_profile:
    name: test-profile
    state: absent
  register: incus_profile_absent_idempotent_state

- name: Ensure incus profile deletion is idempotent
  ansible.builtin.assert:
    that:
      - incus_profile_absent_idempotent_state is not changed

- name: Ensure incus profile info after deletion
  damex.incus.incus_profile_info: {}
  register: incus_profile_info_after_state

- name: Ensure incus profile info after deletion
  ansible.builtin.assert:
    that:
      - "'test-profile' not in incus_profile_info_after_state.profiles | map(attribute='name')"
