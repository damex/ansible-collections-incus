---
- name: Ensure incus cluster storage {{ incus_storages_storage_name }}
  when: incus_storages_cluster_info_state.cluster_members | length == 0 or 'database-leader' in incus_storages_cluster_info_state.cluster_members | map(attribute='roles') | first
  block:
    - name: Ensure incus cluster storage member {{ incus_storages_storage_name }}
      damex.incus.incus_storage:
        name: "{{ incus_storages_storage_name }}"
        state: "{{ incus_storages_storage_state }}"
        driver: "{{ incus_storages_storage.driver }}"
        description: "{{ incus_storages_storage_description }}"
        config: "{{ incus_storages_storage.config | combine(incus_storages_target.config) if (incus_storages_storage.config is defined and incus_storages_target.config is defined) else incus_storages_target.config if incus_storages_target.config is defined else incus_storages_storage.config | default(omit) }}"
        target: "{{ incus_storages_target.name }}"
        socket_path: "{{ incus_storages_storage_socket_path }}"
        url: "{{ incus_storages_storage_url }}"
        client_cert: "{{ incus_storages_storage_client_cert }}"
        client_key: "{{ incus_storages_storage_client_key }}"
        server_cert: "{{ incus_storages_storage_server_cert }}"
        client_cert_path: "{{ incus_storages_storage_client_cert_path }}"
        client_key_path: "{{ incus_storages_storage_client_key_path }}"
        server_cert_path: "{{ incus_storages_storage_server_cert_path }}"
        token: "{{ incus_storages_storage_token }}"
        validate_certs: "{{ incus_storages_storage_validate_certs }}"
      no_log: "{{ incus_storages_client_key is defined or incus_storages_token is defined or (incus_storages_storage.config is defined and 'truenas.api_key' in incus_storages_storage.config) }}"
      become: true
      loop: "{{ incus_storages_storage.targets }}"
      loop_control:
        label: "{{ incus_storages_target.name }}"
        loop_var: incus_storages_target
    - name: Ensure incus cluster storage finalized {{ incus_storages_storage_name }}
      damex.incus.incus_storage:
        name: "{{ incus_storages_storage_name }}"
        state: "{{ incus_storages_storage_state }}"
        driver: "{{ incus_storages_storage.driver }}"
        description: "{{ incus_storages_storage_description }}"
        config: "{{ incus_storages_storage.config | dict2items | rejectattr('key', 'in', incus_storages_storage_member_config_keys) | items2dict if incus_storages_storage.config is defined else omit }}"
        socket_path: "{{ incus_storages_storage_socket_path }}"
        url: "{{ incus_storages_storage_url }}"
        client_cert: "{{ incus_storages_storage_client_cert }}"
        client_key: "{{ incus_storages_storage_client_key }}"
        server_cert: "{{ incus_storages_storage_server_cert }}"
        client_cert_path: "{{ incus_storages_storage_client_cert_path }}"
        client_key_path: "{{ incus_storages_storage_client_key_path }}"
        server_cert_path: "{{ incus_storages_storage_server_cert_path }}"
        token: "{{ incus_storages_storage_token }}"
        validate_certs: "{{ incus_storages_storage_validate_certs }}"
      vars:
        incus_storages_storage_member_config_keys:
          - source
          - size
          - zfs.pool_name
          - lvm.thinpool_name
          - lvm.vg_name
      no_log: "{{ incus_storages_client_key is defined or incus_storages_token is defined or (incus_storages_storage.config is defined and 'truenas.api_key' in incus_storages_storage.config) }}"
      become: true
