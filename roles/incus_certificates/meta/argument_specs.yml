---
argument_specs:
  main:
    short_description: Ensure Incus certificates.
    description:
      - Ensure Incus certificates.
    examples: |
      - name: Ensure incus certificates
        hosts: incus
        tasks:
          - name: Ensure incus certificates
            ansible.builtin.import_role:
              name: damex.incus.incus_certificates
            vars:
              incus_certificates:
                - name: monitoring
                  certificate: "{{ lookup('file', 'certs/monitoring.crt') }}"
                  type: client
                - name: backup
                  certificate: "{{ lookup('file', 'certs/backup.crt') }}"
                  type: client
    options:
      incus_certificates:
        description: List of certificates to ensure.
        type: list
        elements: dict
        options:
          name:
            description: Name of the certificate.
            required: true
            type: str
          certificate:
            description: PEM-encoded certificate content.
            type: str
          type:
            description: Type of the certificate.
            type: str
            choices:
              - client
              - metrics
          restricted:
            description: Whether the certificate is restricted.
            type: bool
          projects:
            description: List of projects the certificate has access to.
            type: list
            elements: str
          state:
            description: Desired state of the certificate.
            type: str
            choices:
              - present
              - absent
      incus_certificates_socket_path:
        description: Path to the Incus Unix socket.
        type: path
      incus_certificates_url:
        description: URL of the Incus server API.
        type: str
      incus_certificates_client_cert:
        description: Client certificate content for API authentication.
        type: str
      incus_certificates_client_key:
        description: Client key content for API authentication.
        type: str
      incus_certificates_server_cert:
        description: Server certificate content for API verification.
        type: str
      incus_certificates_client_cert_path:
        description: Path to the TLS client certificate for API authentication.
        type: path
      incus_certificates_client_key_path:
        description: Path to the TLS client key for API authentication.
        type: path
      incus_certificates_server_cert_path:
        description: Path to the TLS server certificate for API verification.
        type: path
      incus_certificates_token:
        description: Authentication token for the Incus API.
        type: str
      incus_certificates_validate_certs:
        description: Whether to validate TLS certificates.
        type: bool
      incus_certificates_state:
        description: Desired state of the certificates.
        type: str
        choices:
          - present
          - absent
