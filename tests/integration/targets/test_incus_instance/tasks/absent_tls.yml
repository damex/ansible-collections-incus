---
- name: Ensure incus instance is deleted (tls)
  damex.incus.incus_instance:
    name: tls-test-instance
    state: absent
    url: https://127.0.0.1:8443
    client_cert_path: /tmp/tls-client.crt
    client_key_path: /tmp/tls-client.key
    server_cert_path: /var/lib/incus/server.crt
  register: incus_instance_tls_absent_state

- name: Ensure incus instance is deleted (tls)
  ansible.builtin.assert:
    that:
      - incus_instance_tls_absent_state is changed

- name: Ensure incus instance deletion is idempotent (tls)
  damex.incus.incus_instance:
    name: tls-test-instance
    state: absent
    url: https://127.0.0.1:8443
    client_cert_path: /tmp/tls-client.crt
    client_key_path: /tmp/tls-client.key
    server_cert_path: /var/lib/incus/server.crt
  register: incus_instance_tls_absent_idempotent_state

- name: Ensure incus instance deletion is idempotent (tls)
  ansible.builtin.assert:
    that:
      - incus_instance_tls_absent_idempotent_state is not changed

- name: Ensure incus instance info after deletion (tls)
  damex.incus.incus_instance_info:
    url: https://127.0.0.1:8443
    client_cert_path: /tmp/tls-client.crt
    client_key_path: /tmp/tls-client.key
    server_cert_path: /var/lib/incus/server.crt
  register: incus_instance_tls_info_after_state

- name: Ensure incus instance info after deletion (tls)
  ansible.builtin.assert:
    that:
      - "'tls-test-instance' not in incus_instance_tls_info_after_state.instances | map(attribute='name')"
