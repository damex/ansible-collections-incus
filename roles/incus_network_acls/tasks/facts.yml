---
- name: Ensure incus network acls cluster member facts
  damex.incus.incus_cluster_member_info:
    name: "{{ inventory_hostname }}"
    socket_path: "{{ incus_network_acls_socket_path }}"
    url: "{{ incus_network_acls_url | default(omit) }}"
    client_cert: "{{ incus_network_acls_client_cert | default(omit) }}"
    client_key: "{{ incus_network_acls_client_key | default(omit) }}"
    server_cert: "{{ incus_network_acls_server_cert | default(omit) }}"
    client_cert_path: "{{ incus_network_acls_client_cert_path | default(omit) }}"
    client_key_path: "{{ incus_network_acls_client_key_path | default(omit) }}"
    server_cert_path: "{{ incus_network_acls_server_cert_path | default(omit) }}"
    token: "{{ incus_network_acls_token | default(omit) }}"
    validate_certs: "{{ incus_network_acls_validate_certs }}"
  no_log: "{{ incus_network_acls_client_key is defined or incus_network_acls_token is defined }}"
  register: incus_network_acls_cluster_info_state
  become: true
