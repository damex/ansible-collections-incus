---
- name: Ensure incus storage
  block:
    - name: Ensure incus storage present (socket)
      ansible.builtin.import_tasks: present_socket.yml
    - name: Ensure incus storage absent (socket)
      ansible.builtin.import_tasks: absent_socket.yml
    - name: Ensure incus storage present (tls)
      ansible.builtin.import_tasks: present_tls.yml
    - name: Ensure incus storage absent (tls)
      ansible.builtin.import_tasks: absent_tls.yml
