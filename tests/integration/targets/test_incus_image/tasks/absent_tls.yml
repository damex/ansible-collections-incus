---
- name: Ensure incus image is deleted (tls)
  damex.incus.incus_image:
    alias: tls-test-alpine
    state: absent
    url: https://127.0.0.1:8443
    client_cert: /tmp/tls-client.crt
    client_key: /tmp/tls-client.key
    server_cert: /var/lib/incus/server.crt
  register: incus_image_tls_absent_state

- name: Ensure incus image is deleted (tls)
  ansible.builtin.assert:
    that:
      - incus_image_tls_absent_state is changed

- name: Ensure incus image deletion is idempotent (tls)
  damex.incus.incus_image:
    alias: tls-test-alpine
    state: absent
    url: https://127.0.0.1:8443
    client_cert: /tmp/tls-client.crt
    client_key: /tmp/tls-client.key
    server_cert: /var/lib/incus/server.crt
  register: incus_image_tls_absent_idempotent_state

- name: Ensure incus image deletion is idempotent (tls)
  ansible.builtin.assert:
    that:
      - incus_image_tls_absent_idempotent_state is not changed
