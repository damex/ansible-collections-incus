---
- name: Ensure incus image import {{ incus_image_imports_image_import_alias }}
  damex.incus.incus_image_import:
    alias: "{{ incus_image_imports_image_import_alias }}"
    aliases: "{{ incus_image_imports_image_import_aliases }}"
    source: "{{ incus_image_imports_image_import_source }}"
    architecture: "{{ incus_image_imports_image_import_architecture }}"
    properties: "{{ incus_image_imports_image_import_properties }}"
    checksum: "{{ incus_image_imports_image_import_checksum }}"
    checksum_algorithm: "{{ incus_image_imports_image_import_checksum_algorithm }}"
    public: "{{ incus_image_imports_image_import_public }}"
    force: "{{ incus_image_imports_image_import_force }}"
    timeout: "{{ incus_image_imports_image_import_timeout }}"
    project: "{{ incus_image_imports_image_import_project }}"
    state: "{{ incus_image_imports_image_import_state }}"
    socket_path: "{{ incus_image_imports_image_import_socket_path }}"
    url: "{{ incus_image_imports_image_import_url }}"
    client_cert: "{{ incus_image_imports_image_import_client_cert }}"
    client_key: "{{ incus_image_imports_image_import_client_key }}"
    server_cert: "{{ incus_image_imports_image_import_server_cert }}"
    client_cert_path: "{{ incus_image_imports_image_import_client_cert_path }}"
    client_key_path: "{{ incus_image_imports_image_import_client_key_path }}"
    server_cert_path: "{{ incus_image_imports_image_import_server_cert_path }}"
    token: "{{ incus_image_imports_image_import_token }}"
    validate_certs: "{{ incus_image_imports_image_import_validate_certs }}"
  no_log: "{{ incus_image_imports_client_key is defined or incus_image_imports_token is defined }}"
  become: true
  when: incus_image_imports_cluster_info_state.cluster_members | length == 0 or 'database-leader' in incus_image_imports_cluster_info_state.cluster_members | map(attribute='roles') | first
