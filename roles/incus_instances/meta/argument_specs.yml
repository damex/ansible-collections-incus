---
argument_specs:
  main:
    short_description: Ensure Incus instances.
    description:
      - Ensure Incus instances.
    examples: |
      - name: Ensure incus instances
        hosts: incus
        tasks:
          - name: Ensure incus instances
            ansible.builtin.import_role:
              name: damex.incus.incus_instances
            vars:
              incus_instances:
                - name: web-01
                  source: images:debian/13
                  profiles:
                    - default
                  config:
                    limits.cpu: "2"
                    limits.memory: 2GB
                - name: db-01
                  source: images:ubuntu/24.04
                  type: virtual-machine
                  config:
                    limits.cpu: "4"
                    limits.memory: 4GB
                  devices:
                    data:
                      type: disk
                      source: data
                      path: /var/lib/postgresql

      - name: Ensure incus instances with cloud-init
        hosts: incus
        tasks:
          - name: Ensure incus instances with cloud-init
            ansible.builtin.import_role:
              name: damex.incus.incus_instances
            vars:
              incus_instances:
                - name: app-01
                  source: images:debian/13
                  config:
                    cloud-init.user-data:
                      users:
                        - name: deploy
                          groups: sudo
                          shell: /bin/bash
                          ssh_authorized_keys:
                            - ssh-ed25519 AAAA... deploy@example.com
                      packages:
                        - nginx
                        - postgresql-client
    options:
      incus_instances:
        description: List of instances to ensure.
        type: list
        elements: dict
        options:
          name:
            description: Name of the instance.
            required: true
            type: str
          type:
            description: Instance type.
            type: str
            choices:
              - container
              - virtual-machine
          source:
            description: Image source for the instance.
            required: true
            type: str
          config:
            description: Instance configuration keys.
            type: dict
            options:
              limits.cpu:
                description: Number or range of CPUs to expose.
                type: str
              limits.memory:
                description: Percentage of host memory or fixed value in bytes.
                type: str
              limits.processes:
                description: Maximum number of processes in the instance.
                type: int
              limits.cpu.priority:
                description: CPU scheduling priority compared to other instances.
                type: int
              limits.cpu.allowance:
                description: CPU time allowance as a percentage or fixed duration.
                type: str
              limits.disk.priority:
                description: I/O request priority when under load (0-10).
                type: int
              limits.network.priority:
                description: Network I/O priority compared to other instances.
                type: int
              raw.qemu:
                description: Raw QEMU command-line arguments.
                type: str
              boot.autostart:
                description: Whether to start the instance on daemon startup.
                type: bool
              boot.autostart.delay:
                description: Seconds to wait after the instance started.
                type: int
              boot.autostart.priority:
                description: Instance startup priority (higher starts first).
                type: int
              security.privileged:
                description: Whether to run the instance in privileged mode.
                type: bool
              security.nesting:
                description: Allow running Incus inside the instance.
                type: bool
              security.agent.metrics:
                description: Whether the incus-agent exposes metrics.
                type: bool
              security.bpffs.delegate_attachs:
                description: Delegated BPF attach types.
                type: str
              security.bpffs.delegate_cmds:
                description: Delegated BPF commands.
                type: str
              security.bpffs.delegate_maps:
                description: Delegated BPF map types.
                type: str
              security.bpffs.delegate_progs:
                description: Delegated BPF program types.
                type: str
              security.bpffs.path:
                description: Path to the BPFFS mount in the instance.
                type: str
              security.csm:
                description: Whether to enable Compatibility Support Module.
                type: bool
              security.guestapi:
                description: Whether to enable the guest API.
                type: bool
              security.guestapi.images:
                description: Whether to allow image access via the guest API.
                type: bool
              security.idmap.base:
                description: Base host UID/GID for the ID map.
                type: int
              security.idmap.isolated:
                description: Whether to use a unique ID map for the instance.
                type: bool
              security.idmap.size:
                description: Size of the ID map range.
                type: int
              security.iommu:
                description: Whether to enable IOMMU for the instance.
                type: bool
              security.protection.delete:
                description: Whether to prevent deletion of the instance.
                type: bool
              security.protection.shift:
                description: Whether to prevent UID/GID shifting.
                type: bool
              security.secureboot:
                description: Whether to enable UEFI Secure Boot.
                type: bool
              security.sev:
                description: Whether to enable AMD SEV encryption.
                type: bool
              security.sev.policy.es:
                description: Whether to enable SEV-ES for the instance.
                type: bool
              security.sev.session.data:
                description: SEV session data blob.
                type: str
              security.sev.session.dh:
                description: SEV Diffie-Hellman key.
                type: str
              security.syscalls.allow:
                description: Allowed syscalls whitelist.
                type: str
              security.syscalls.deny:
                description: Denied syscalls blacklist.
                type: str
              security.syscalls.deny_compat:
                description: Whether to block compat syscalls on amd64.
                type: bool
              security.syscalls.deny_default:
                description: Whether to enable default syscall deny list.
                type: bool
              security.syscalls.intercept.bpf:
                description: Whether to intercept bpf syscalls.
                type: bool
              security.syscalls.intercept.bpf.devices:
                description: Whether to allow device-type BPF programs.
                type: bool
              security.syscalls.intercept.mknod:
                description: Whether to intercept mknod syscalls.
                type: bool
              security.syscalls.intercept.mount:
                description: Whether to intercept mount syscalls.
                type: bool
              security.syscalls.intercept.mount.allowed:
                description: Filesystems allowed for intercepted mounts.
                type: str
              security.syscalls.intercept.mount.fuse:
                description: FUSE mounts to redirect intercepted mounts to.
                type: str
              security.syscalls.intercept.mount.shift:
                description: Whether to use ID-mapped mounts for intercepted mounts.
                type: bool
              security.syscalls.intercept.sched_setscheduler:
                description: Whether to intercept sched_setscheduler syscalls.
                type: bool
              security.syscalls.intercept.setxattr:
                description: Whether to intercept setxattr syscalls.
                type: bool
              security.syscalls.intercept.sysinfo:
                description: Whether to intercept sysinfo syscalls.
                type: bool
              migration.stateful:
                description: Allow stateful stop/start and snapshots.
                type: bool
              migration.incremental.memory:
                description: Whether to use incremental memory transfer.
                type: bool
              migration.incremental.memory.goal:
                description: Target percentage of dirty memory for completion.
                type: int
              migration.incremental.memory.iterations:
                description: Maximum number of memory transfer iterations.
                type: int
              limits.cpu.nodes:
                description: NUMA nodes to restrict the instance to.
                type: str
              limits.hugepages.1GB:
                description: Limit for 1GB huge pages.
                type: str
              limits.hugepages.1MB:
                description: Limit for 1MB huge pages.
                type: str
              limits.hugepages.2MB:
                description: Limit for 2MB huge pages.
                type: str
              limits.hugepages.64KB:
                description: Limit for 64KB huge pages.
                type: str
              limits.memory.enforce:
                description: Memory limit enforcement mode.
                type: str
              limits.memory.hotplug:
                description: Whether to enable memory hotplug.
                type: str
              limits.memory.hugepages:
                description: Whether to back instance memory with huge pages.
                type: bool
              limits.memory.oom_priority:
                description: OOM killer priority for the instance.
                type: int
              limits.memory.swap:
                description: Whether to encourage or discourage swapping.
                type: str
              limits.memory.swap.priority:
                description: Swap priority compared to other instances.
                type: int
              boot.autorestart:
                description: Whether to restart the instance after a crash.
                type: bool
              boot.host_shutdown_action:
                description: Action to take on host shutdown.
                type: str
              boot.host_shutdown_timeout:
                description: Seconds to wait for instance to stop on host shutdown.
                type: int
              boot.stop.priority:
                description: Instance shutdown priority (higher stops first).
                type: int
              snapshots.expiry:
                description: Automatic expiry time for snapshots.
                type: str
              snapshots.expiry.manual:
                description: Expiry time for manually created snapshots.
                type: str
              snapshots.pattern:
                description: Pongo2 template for snapshot names.
                type: str
              snapshots.schedule:
                description: Cron expression for automatic snapshots.
                type: str
              snapshots.schedule.stopped:
                description: Whether to snapshot stopped instances.
                type: bool
              nvidia.driver.capabilities:
                description: NVIDIA driver capabilities to expose.
                type: str
              nvidia.require.cuda:
                description: Required CUDA version.
                type: str
              nvidia.require.driver:
                description: Required NVIDIA driver version.
                type: str
              nvidia.runtime:
                description: Pass NVIDIA runtime libraries into the container.
                type: bool
              raw.apparmor:
                description: Raw AppArmor profile entries.
                type: str
              raw.idmap:
                description: Raw ID map configuration.
                type: str
              raw.lxc:
                description: Raw LXC configuration to append.
                type: str
              raw.qemu.conf:
                description: Raw QEMU configuration overrides.
                type: str
              raw.qemu.qmp.early:
                description: Raw QMP commands before instance start.
                type: str
              raw.qemu.qmp.pre-start:
                description: Raw QMP commands just before instance start.
                type: str
              raw.qemu.qmp.post-start:
                description: Raw QMP commands after instance start.
                type: str
              raw.qemu.scriptlet:
                description: Raw QEMU scriptlet.
                type: str
              raw.seccomp:
                description: Raw Seccomp configuration.
                type: str
              agent.nic_config:
                description: Use instance NIC names and MTU for default interfaces.
                type: bool
              cluster.evacuate:
                description: Evacuation behavior during cluster evacuation.
                type: str
                choices:
                  - auto
                  - live-migrate
                  - migrate
                  - stop
                  - stateful-stop
                  - force-stop
              linux.kernel_modules:
                description: Comma-separated kernel modules to load.
                type: str
              oci.cwd:
                description: Working directory for the OCI container.
                type: str
              oci.entrypoint:
                description: Entrypoint for the OCI container.
                type: str
              oci.gid:
                description: GID to run the OCI container as.
                type: str
              oci.uid:
                description: UID to run the OCI container as.
                type: str
              environment_variables:
                description: List of environment variables to set in the instance.
                type: list
                elements: dict
                options:
                  name:
                    description: Environment variable name.
                    required: true
                    type: str
                  value:
                    description: Environment variable value.
                    required: true
                    type: str
              cloud-init.network-config:
                description: Cloud-init network configuration.
                type: dict
                options:
                  version:
                    description: Network config format version.
                    type: int
                  renderer:
                    description: Network renderer to use.
                    type: str
                  ethernets:
                    description: Ethernet interface configurations.
                    type: list
                    elements: dict
                    options:
                      name:
                        description: Interface name.
                        required: true
                        type: str
                      dhcp4:
                        description: Whether to enable DHCPv4.
                        type: bool
                      dhcp6:
                        description: Whether to enable DHCPv6.
                        type: bool
                      gateway4:
                        description: Default IPv4 gateway address.
                        type: str
                      gateway6:
                        description: Default IPv6 gateway address.
                        type: str
                      mtu:
                        description: Maximum transmission unit for the interface.
                        type: int
                      optional:
                        description: Whether the interface is optional for boot.
                        type: bool
                      set-name:
                        description: Rename the interface to this name.
                        type: str
                      accept-ra:
                        description: Whether to accept IPv6 Router Advertisements.
                        type: bool
                      addresses:
                        description: Static addresses in CIDR notation.
                        type: list
                        elements: str
                      routes:
                        description: Static routes for the interface.
                        type: list
                        elements: dict
                        options:
                          to:
                            description: Route destination in CIDR notation.
                            type: str
                          via:
                            description: Gateway address for the route.
                            type: str
                          metric:
                            description: Route metric value.
                            type: int
                          table:
                            description: Routing table ID for the route.
                            type: int
                          scope:
                            description: Route scope.
                            type: str
                      match:
                        description: Match rules for the interface.
                        type: dict
                        options:
                          name:
                            description: Interface name glob pattern to match.
                            type: str
                          macaddress:
                            description: MAC address to match.
                            type: str
                          driver:
                            description: Kernel driver name to match.
                            type: str
                      nameservers:
                        description: DNS server configuration.
                        type: dict
                        options:
                          addresses:
                            description: List of DNS server addresses.
                            type: list
                            elements: str
                          search:
                            description: List of DNS search domains.
                            type: list
                            elements: str
                  bonds:
                    description: Bond interface configurations.
                    type: list
                    elements: dict
                    options:
                      name:
                        description: Bond name.
                        required: true
                        type: str
                      dhcp4:
                        description: Whether to enable DHCPv4.
                        type: bool
                      dhcp6:
                        description: Whether to enable DHCPv6.
                        type: bool
                      gateway4:
                        description: Default IPv4 gateway address.
                        type: str
                      gateway6:
                        description: Default IPv6 gateway address.
                        type: str
                      mtu:
                        description: Maximum transmission unit for the interface.
                        type: int
                      optional:
                        description: Whether the interface is optional for boot.
                        type: bool
                      set-name:
                        description: Rename the interface to this name.
                        type: str
                      accept-ra:
                        description: Whether to accept IPv6 Router Advertisements.
                        type: bool
                      addresses:
                        description: Static addresses in CIDR notation.
                        type: list
                        elements: str
                      interfaces:
                        description: Member interfaces for the bond.
                        type: list
                        elements: str
                      parameters:
                        description: Bond parameters.
                        type: dict
                        options:
                          mode:
                            description: Bonding mode.
                            type: str
                          mii-monitor-interval:
                            description: MII monitoring interval in milliseconds.
                            type: int
                      routes:
                        description: Static routes for the bond.
                        type: list
                        elements: dict
                        options:
                          to:
                            description: Route destination in CIDR notation.
                            type: str
                          via:
                            description: Gateway address for the route.
                            type: str
                          metric:
                            description: Route metric value.
                            type: int
                          table:
                            description: Routing table ID for the route.
                            type: int
                          scope:
                            description: Route scope.
                            type: str
                      nameservers:
                        description: DNS server configuration.
                        type: dict
                        options:
                          addresses:
                            description: List of DNS server addresses.
                            type: list
                            elements: str
                          search:
                            description: List of DNS search domains.
                            type: list
                            elements: str
                  bridges:
                    description: Bridge interface configurations.
                    type: list
                    elements: dict
                    options:
                      name:
                        description: Bridge name.
                        required: true
                        type: str
                      dhcp4:
                        description: Whether to enable DHCPv4.
                        type: bool
                      dhcp6:
                        description: Whether to enable DHCPv6.
                        type: bool
                      gateway4:
                        description: Default IPv4 gateway address.
                        type: str
                      gateway6:
                        description: Default IPv6 gateway address.
                        type: str
                      mtu:
                        description: Maximum transmission unit for the interface.
                        type: int
                      optional:
                        description: Whether the interface is optional for boot.
                        type: bool
                      set-name:
                        description: Rename the interface to this name.
                        type: str
                      accept-ra:
                        description: Whether to accept IPv6 Router Advertisements.
                        type: bool
                      addresses:
                        description: Static addresses in CIDR notation.
                        type: list
                        elements: str
                      interfaces:
                        description: Member interfaces for the bridge.
                        type: list
                        elements: str
                      parameters:
                        description: Bridge parameters.
                        type: dict
                        options:
                          stp:
                            description: Whether to enable Spanning Tree Protocol.
                            type: bool
                          forward-delay:
                            description: Forwarding delay in seconds.
                            type: int
                      routes:
                        description: Static routes for the bridge.
                        type: list
                        elements: dict
                        options:
                          to:
                            description: Route destination in CIDR notation.
                            type: str
                          via:
                            description: Gateway address for the route.
                            type: str
                          metric:
                            description: Route metric value.
                            type: int
                          table:
                            description: Routing table ID for the route.
                            type: int
                          scope:
                            description: Route scope.
                            type: str
                      nameservers:
                        description: DNS server configuration.
                        type: dict
                        options:
                          addresses:
                            description: List of DNS server addresses.
                            type: list
                            elements: str
                          search:
                            description: List of DNS search domains.
                            type: list
                            elements: str
                  vlans:
                    description: VLAN interface configurations.
                    type: list
                    elements: dict
                    options:
                      name:
                        description: VLAN interface name.
                        required: true
                        type: str
                      id:
                        description: VLAN ID.
                        required: true
                        type: int
                      link:
                        description: Parent interface for the VLAN.
                        required: true
                        type: str
                      dhcp4:
                        description: Whether to enable DHCPv4.
                        type: bool
                      dhcp6:
                        description: Whether to enable DHCPv6.
                        type: bool
                      gateway4:
                        description: Default IPv4 gateway address.
                        type: str
                      gateway6:
                        description: Default IPv6 gateway address.
                        type: str
                      mtu:
                        description: Maximum transmission unit for the interface.
                        type: int
                      optional:
                        description: Whether the interface is optional for boot.
                        type: bool
                      set-name:
                        description: Rename the interface to this name.
                        type: str
                      accept-ra:
                        description: Whether to accept IPv6 Router Advertisements.
                        type: bool
                      addresses:
                        description: Static addresses in CIDR notation.
                        type: list
                        elements: str
                      routes:
                        description: Static routes for the VLAN.
                        type: list
                        elements: dict
                        options:
                          to:
                            description: Route destination in CIDR notation.
                            type: str
                          via:
                            description: Gateway address for the route.
                            type: str
                          metric:
                            description: Route metric value.
                            type: int
                          table:
                            description: Routing table ID for the route.
                            type: int
                          scope:
                            description: Route scope.
                            type: str
                      nameservers:
                        description: DNS server configuration.
                        type: dict
                        options:
                          addresses:
                            description: List of DNS server addresses.
                            type: list
                            elements: str
                          search:
                            description: List of DNS search domains.
                            type: list
                            elements: str
              cloud-init.user-data:
                description: Cloud-init user data configuration.
                type: dict
                options:
                  bootcmd:
                    description: Commands to run early in the boot process.
                    type: list
                    elements: raw
                  users:
                    description: List of users to create.
                    type: list
                    elements: dict
                    options:
                      name:
                        description: User login name.
                        required: true
                        type: str
                      groups:
                        description: Groups to add the user to.
                        type: raw
                      shell:
                        description: Login shell for the user.
                        type: str
                      sudo:
                        description: Sudo rule for the user.
                        type: raw
                      ssh_authorized_keys:
                        description: SSH public keys for the user.
                        type: list
                        elements: str
                      ssh_import_id:
                        description: SSH IDs to import public keys from.
                        type: list
                        elements: str
                      ssh_redirect_user:
                        description: Whether to disable SSH login and redirect to default user.
                        type: bool
                      lock_passwd:
                        description: Whether to lock the user password.
                        type: bool
                      passwd:
                        description: Hashed password for the user.
                        type: str
                      plain_text_passwd:
                        description: Plain text password for the user.
                        type: str
                      hashed_passwd:
                        description: Pre-hashed password for the user.
                        type: str
                      gecos:
                        description: GECOS field for the user.
                        type: str
                      homedir:
                        description: Home directory for the user.
                        type: str
                      primary_group:
                        description: Primary group for the user.
                        type: str
                      no_create_home:
                        description: Whether to skip home directory creation.
                        type: bool
                      no_user_group:
                        description: Whether to skip user group creation.
                        type: bool
                      no_log_init:
                        description: Whether to skip logging of user initialization.
                        type: bool
                      create_groups:
                        description: Whether to create specified groups for the user.
                        type: bool
                      expiredate:
                        description: Account expiration date.
                        type: str
                      inactive:
                        description: Days after password expires until account is disabled.
                        type: str
                      system:
                        description: Whether to create a system user.
                        type: bool
                      uid:
                        description: Numeric user ID.
                        type: int
                      snapuser:
                        description: Email for Snappy user creation.
                        type: str
                      doas:
                        description: List of doas rules for the user.
                        type: list
                        elements: str
                      selinux_user:
                        description: SELinux user for login mapping.
                        type: str
                  groups:
                    description: List of groups to create.
                    type: list
                    elements: raw
                  user:
                    description: Default user name to create.
                    type: str
                  password:
                    description: Password for the default user.
                    type: str
                  ssh_pwauth:
                    description: Whether to enable SSH password authentication.
                    type: bool
                  ssh_authorized_keys:
                    description: SSH public keys to add to the default user.
                    type: list
                    elements: str
                  ssh_deletekeys:
                    description: Whether to delete default SSH host keys.
                    type: bool
                  ssh_genkeytypes:
                    description: SSH key types to generate.
                    type: list
                    elements: str
                  ssh_keys:
                    description: SSH host key pairs.
                    type: dict
                    options:
                      ed25519_private:
                        description: Ed25519 private host key.
                        type: str
                      ed25519_public:
                        description: Ed25519 public host key.
                        type: str
                      ed25519_certificate:
                        description: Ed25519 host certificate.
                        type: str
                      rsa_private:
                        description: RSA private host key.
                        type: str
                      rsa_public:
                        description: RSA public host key.
                        type: str
                      rsa_certificate:
                        description: RSA host certificate.
                        type: str
                      ecdsa_private:
                        description: ECDSA private host key.
                        type: str
                      ecdsa_public:
                        description: ECDSA public host key.
                        type: str
                      ecdsa_certificate:
                        description: ECDSA host certificate.
                        type: str
                  ssh_publish_hostkeys:
                    description: SSH host key publishing configuration.
                    type: dict
                    options:
                      enabled:
                        description: Whether to publish host keys.
                        type: bool
                      blacklist:
                        description: Key types to exclude from publishing.
                        type: list
                        elements: str
                  ssh_quiet_keygen:
                    description: Whether to suppress SSH key generation output.
                    type: bool
                  allow_public_ssh_keys:
                    description: Whether to allow public SSH keys.
                    type: bool
                  disable_root:
                    description: Whether to disable root login.
                    type: bool
                  disable_root_opts:
                    description: SSH options applied when root login is disabled.
                    type: str
                  chpasswd:
                    description: Password change settings.
                    type: dict
                    options:
                      expire:
                        description: Whether the password expires on first login.
                        type: bool
                      users:
                        description: List of users with password settings.
                        type: list
                        elements: dict
                        options:
                          name:
                            description: User name.
                            required: true
                            type: str
                          password:
                            description: Password value.
                            type: str
                          type:
                            description: Password type.
                            type: str
                            choices:
                              - text
                              - hash
                              - RANDOM
                  timezone:
                    description: System timezone.
                    type: str
                  locale:
                    description: System locale.
                    type: str
                  locale_configfile:
                    description: Path to the locale configuration file.
                    type: str
                  hostname:
                    description: System hostname.
                    type: str
                  fqdn:
                    description: Fully qualified domain name.
                    type: str
                  prefer_fqdn_over_hostname:
                    description: Whether to prefer FQDN over short hostname.
                    type: bool
                  manage_etc_hosts:
                    description: Whether to manage /etc/hosts.
                    type: bool
                  package_update:
                    description: Whether to update package lists on first boot.
                    type: bool
                  package_upgrade:
                    description: Whether to upgrade packages on first boot.
                    type: bool
                  package_reboot_if_required:
                    description: Whether to reboot after package upgrade if required.
                    type: bool
                  packages:
                    description: Packages to install on first boot.
                    type: list
                    elements: str
                  apt:
                    description: APT package manager configuration.
                    type: dict
                    options:
                      sources_list:
                        description: Custom sources.list content.
                        type: str
                      preserve_sources_list:
                        description: Whether to preserve existing sources.list.
                        type: bool
                      disable_suites:
                        description: APT suites to disable.
                        type: list
                        elements: str
                      primary:
                        description: Primary mirror configuration.
                        type: list
                        elements: raw
                      security:
                        description: Security mirror configuration.
                        type: list
                        elements: raw
