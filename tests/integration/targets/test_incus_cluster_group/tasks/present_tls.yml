---
- name: Ensure incus cluster group is created (tls)
  damex.incus.incus_cluster_group:
    name: tls-test-group
    description: Test cluster group (tls)
    url: https://127.0.0.1:8443
    client_cert_path: /tmp/tls-client.crt
    client_key_path: /tmp/tls-client.key
    server_cert_path: /var/lib/incus/cluster.crt
  register: incus_cluster_group_tls_present_state

- name: Ensure incus cluster group is created (tls)
  ansible.builtin.assert:
    that:
      - incus_cluster_group_tls_present_state is changed

- name: Ensure incus cluster group is idempotent (tls)
  damex.incus.incus_cluster_group:
    name: tls-test-group
    description: Test cluster group (tls)
    url: https://127.0.0.1:8443
    client_cert_path: /tmp/tls-client.crt
    client_key_path: /tmp/tls-client.key
    server_cert_path: /var/lib/incus/cluster.crt
  register: incus_cluster_group_tls_idempotent_state

- name: Ensure incus cluster group is idempotent (tls)
  ansible.builtin.assert:
    that:
      - incus_cluster_group_tls_idempotent_state is not changed

- name: Ensure incus cluster group info (tls)
  damex.incus.incus_cluster_group_info:
    url: https://127.0.0.1:8443
    client_cert_path: /tmp/tls-client.crt
    client_key_path: /tmp/tls-client.key
    server_cert_path: /var/lib/incus/cluster.crt
  register: incus_cluster_group_tls_info_state

- name: Ensure incus cluster group info (tls)
  ansible.builtin.assert:
    that:
      - incus_cluster_group_tls_info_state.cluster_groups is defined
      - "'tls-test-group' in incus_cluster_group_tls_info_state.cluster_groups | map(attribute='name')"

- name: Ensure incus cluster group info by name (tls)
  damex.incus.incus_cluster_group_info:
    name: tls-test-group
    url: https://127.0.0.1:8443
    client_cert_path: /tmp/tls-client.crt
    client_key_path: /tmp/tls-client.key
    server_cert_path: /var/lib/incus/cluster.crt
  register: incus_cluster_group_tls_info_named_state

- name: Ensure incus cluster group info by name (tls)
  ansible.builtin.assert:
    that:
      - incus_cluster_group_tls_info_named_state.cluster_groups | length == 1
      - "'tls-test-group' in incus_cluster_group_tls_info_named_state.cluster_groups | map(attribute='name')"
      - "'Test cluster group (tls)' in incus_cluster_group_tls_info_named_state.cluster_groups | map(attribute='description')"
