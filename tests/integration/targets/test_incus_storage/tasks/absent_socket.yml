---
- name: Ensure incus storage pool is deleted
  damex.incus.incus_storage:
    name: test-storage-pool
    state: absent
  register: incus_storage_absent_state

- name: Ensure incus storage pool is deleted
  ansible.builtin.assert:
    that:
      - incus_storage_absent_state is changed

- name: Ensure incus storage pool deletion is idempotent
  damex.incus.incus_storage:
    name: test-storage-pool
    state: absent
  register: incus_storage_absent_idempotent_state

- name: Ensure incus storage pool deletion is idempotent
  ansible.builtin.assert:
    that:
      - incus_storage_absent_idempotent_state is not changed

- name: Ensure incus storage info after deletion
  damex.incus.incus_storage_info: {}
  register: incus_storage_info_after_state

- name: Ensure incus storage info after deletion
  ansible.builtin.assert:
    that:
      - "'test-storage-pool' not in incus_storage_info_after_state.storage_pools | map(attribute='name')"
